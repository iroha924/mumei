# End-to-end verification that the mumei plugin distribution is internally
# consistent. Exercises three orthogonal scenarios:
#   1. Manifest + artifact resolution
#   2. Hook script discipline
#   3. Documented .mumei/ layout vs decisions.md
# Posts a single PR comment; failures fail CI.
name: e2e-plugin-load

on:
  pull_request:
    paths:
      - "hooks/**"
      - "skills/**"
      - "agents/**"
      - ".claude-plugin/**"
      - "docs/mumei-decisions.md"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: e2e-plugin-load-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-base-action@beta
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
          # WebFetch tool internally summarizes pages with the Haiku tier;
          # without this override it tries the discontinued
          # `claude-3-5-haiku-20241022` and every fetch returns a model 404.
          # Set on the step env (not `claude_env:`) so subprocess WebFetch
          # inherits it — claude_env did not propagate in practice.
          ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-haiku-4-5-20251001
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/audit-prompts/e2e-plugin-load.md
          model: claude-sonnet-4-6
          max_turns: "30"
          allowed_tools: "Read,Glob,Grep,Bash(gh pr comment:*),Bash(jq:*)"
