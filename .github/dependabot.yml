version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "github-actions"
    open-pull-requests-limit: 5
    # Bundle every GitHub Actions bump (including majors) into one weekly
    # PR. dependency-type grouping is not supported for github-actions, so
    # match by pattern. The deterministic CI checks (lint / bats / codeql)
    # gate each bump inside the grouped PR. ai-review is skipped on bot PRs
    # (the workflow guards on sender.type != 'Bot'), so it does not gate
    # Dependabot updates; a major breaking change still surfaces as a red CI
    # check rather than slipping through ungated.
    groups:
      all-actions:
        patterns: ["*"]

  # pip lock files consumed by .github/workflows/{release-reusable,
  # plugin-json-validate,review-reusable}.yml via `pip install
  # --require-hashes`. One Dependabot entry per lock directory so the
  # `ignore` rule on the review-pipeline pin (frozen at 1.111.0 by
  # policy) does not leak into the release-time pin (which should track
  # current stable). Dependabot recognises the `# This file is
  # autogenerated by pip-compile` header in each requirements.txt and
  # recompiles transitive hashes inside its own updater; the operator
  # only regenerates locally as a fallback when that recompile fails
  # (e.g. Dependabot's pip-tools version drifts from the project's).
  - package-ecosystem: "pip"
    directory: "/.github/requirements/semgrep-release"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "pip"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/.github/requirements/semgrep-review"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "pip"
    open-pull-requests-limit: 5
    # review-pipeline semgrep is frozen at 1.111.0 for grounding signal
    # stability (.github/requirements/semgrep-review/requirements.in).
    # Block every auto-bump (major / minor / patch) so Dependabot does
    # not fight the freeze; a 1.111.x → 1.111.y patch bump still shifts
    # the AI reviewer's grounding fingerprint, so policy is "all bumps
    # are manual". This ignore intentionally scopes only to this entry,
    # not the release pin, which should track current stable.
    ignore:
      - dependency-name: "semgrep"
        update-types:
          - "version-update:semver-major"
          - "version-update:semver-minor"
          - "version-update:semver-patch"

  - package-ecosystem: "pip"
    directory: "/.github/requirements/validate"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencies"
      - "pip"
    open-pull-requests-limit: 5
