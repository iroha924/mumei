# Weekly full audit of distribution files against the latest official Claude
# Code specs. Catches drift caused by upstream spec changes (mumei did not
# change, the spec did). Files an issue (label: audit-weekly) only when there
# are findings.
name: audit-distribution-weekly

on:
  schedule:
    # Sunday 22:00 UTC = Monday 07:00 JST
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: audit-distribution-weekly
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-base-action@beta
        env:
          GH_TOKEN: ${{ github.token }}
          # WebFetch tool internally summarizes pages with the Haiku tier;
          # without this override it tries the discontinued
          # `claude-3-5-haiku-20241022` and every fetch returns a model 404.
          # Set on the step env (not `claude_env:`) so subprocess WebFetch
          # inherits it — claude_env did not propagate in practice.
          ANTHROPIC_DEFAULT_HAIKU_MODEL: claude-haiku-4-5-20251001
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/audit-prompts/distribution-audit-weekly.md
          model: claude-sonnet-4-6
          max_turns: "30"
          allowed_tools: "Read,Glob,Grep,WebFetch,Bash(gh issue:*),Bash(gh label:*)"
