# Monthly audit of doc drift across README.md (English, user-facing),
# CLAUDE.md (Japanese, dev-facing), docs/mumei-decisions.md, and the actual
# implementation. Files an issue (label: doc-drift) only when there are
# inconsistencies.
name: audit-readme-drift

on:
  # Disabled while ANTHROPIC_API_KEY billing is paused. Manual run only.
  # schedule:
  #   - cron: "0 22 1 * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# Opt into Node.js 24 for transitive JS actions (actions/setup-node,
# oven-sh/setup-bun) inside claude-code-base-action. Silences the Node 20
# deprecation warning until those actions publish Node 24-compatible tags.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: audit-readme-drift
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: anthropics/claude-code-base-action@e8132bc5e637a42c27763fc757faa37e1ee43b34 # beta
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/audit-prompts/readme-drift.md
          model: sonnet
          max_turns: "40"
          allowed_tools: "Read,Glob,Grep,Bash(gh issue:*),Bash(gh label:*)"
          # Disallow WebFetch explicitly: removing it from allowed_tools
          # alone is insufficient because the action's defaults include it.
          disallowed_tools: "WebFetch"
