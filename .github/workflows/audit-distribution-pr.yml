# Audit distribution files (hooks/skills/agents/.claude-plugin) on every PR
# that touches them. Posts a single PR comment; CRITICAL findings fail CI.
# Skipped on fork PRs (secrets unavailable per GitHub policy).
name: audit-distribution-pr

on:
  # Disabled while ANTHROPIC_API_KEY billing is paused. Manual run only.
  # pull_request:
  #   paths:
  #     - "hooks/**"
  #     - "skills/**"
  #     - "agents/**"
  #     - ".claude-plugin/**"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

# Opt into Node.js 24 for transitive JS actions (actions/setup-node,
# oven-sh/setup-bun) inside claude-code-base-action. Silences the Node 20
# deprecation warning until those actions publish Node 24-compatible tags.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: audit-distribution-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  audit:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-base-action@e8132bc5e637a42c27763fc757faa37e1ee43b34 # beta
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/audit-prompts/distribution-audit-pr.md
          model: sonnet
          max_turns: "40"
          # No WebFetch — its internal summarizer hits a discontinued Haiku
          # model and 404s. Use Bash(curl:*) instead per the prompt.
          # Disallow WebFetch explicitly: removing it from allowed_tools
          # alone is insufficient because the action's defaults include it.
          allowed_tools: "Read,Glob,Grep,Bash(curl:*),Bash(mkdir:*),Bash(gh pr comment:*),Bash(gh pr view:*),Bash(git diff:*),Bash(git log:*)"
          disallowed_tools: "WebFetch"
