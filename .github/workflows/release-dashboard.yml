name: release-dashboard

# npm publish for mumei-dashboard. Triggered by pushing a
# `dashboard-vX.Y.Z` tag. Build + test + provenance + publish in one
# pass. The mumei plugin tarball workflow (release.yml) is independent.
#
# Setup prerequisites (one-time, repo Settings → Secrets and variables):
#   NPM_TOKEN — npm automation token with publish rights to the
#               unscoped `mumei-dashboard` package. Generate via npm
#               UI: Tokens → Granular token scoped to publish on
#               `mumei-dashboard`.
#
# Required: a `release` Environment with `required_reviewers` (matches
# the plugin release flow). Approval gates the publish step.

on:
  push:
    tags:
      - "dashboard-v[0-9]+.[0-9]+.[0-9]+"
      - "dashboard-v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write # Needed for `gh release create` at the end of the job
  id-token: write # Required for npm provenance (sigstore-backed)

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: install
        working-directory: dashboard
        run: npm ci --prefer-offline

      - name: typecheck
        working-directory: dashboard
        run: npm run typecheck

      - name: lint
        working-directory: dashboard
        run: npm run lint

      - name: test
        working-directory: dashboard
        run: npm test

      - name: build
        working-directory: dashboard
        run: npm run build

      - name: verify tag matches package.json version
        working-directory: dashboard
        run: |
          tag="${GITHUB_REF#refs/tags/dashboard-v}"
          pkg_version="$(node -p 'require("./package.json").version')"
          if [[ "$tag" != "$pkg_version" ]]; then
            echo "::error::tag (${tag}) does not match package.json version (${pkg_version})" >&2
            exit 1
          fi

      - name: pack dry-run (sanity)
        working-directory: dashboard
        run: |
          npm pack --dry-run
          # Show the packed file list for the audit log.
          npm pack --json | jq '.[0].files[].path'

      - name: publish to npm with provenance
        working-directory: dashboard
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --provenance --access public

      - name: create GitHub release for dashboard tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF#refs/tags/}" \
            --title "${GITHUB_REF#refs/tags/}" \
            --generate-notes \
            --notes-start-tag "$(git tag -l 'dashboard-v*' | sort -V | tail -n 2 | head -n 1 || true)"
