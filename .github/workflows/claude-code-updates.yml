# Weekly digest of Claude Code platform updates with concrete proposals for
# how mumei should adapt. Files an issue (label: claude-code-update) only
# when there are actionable changes.
name: claude-code-updates

on:
  schedule:
    # Monday 22:00 UTC = Tuesday 07:00 JST (offset from audit-distribution-weekly)
    - cron: "0 22 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: claude-code-updates
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: anthropics/claude-code-base-action@beta
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/audit-prompts/claude-code-updates.md
          model: claude-opus-4-7
          max_turns: "30"
          allowed_tools: "Read,Glob,Grep,WebFetch,Bash(gh issue:*),Bash(gh label:*)"
