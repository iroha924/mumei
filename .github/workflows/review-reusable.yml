name: review-reusable

# Harness-engineered reusable review workflow (REQ-24). Consuming repos invoke
# this via `uses: hir4ta/mumei/.github/workflows/review-reusable.yml@<ref>` and
# supply the CLAUDE_CODE_OAUTH_TOKEN secret. The rubric (universal taxonomy +
# precision discipline + harness instructions) is INLINED below inside a
# heredoc between the BEGIN/END universal-review-rubric markers so adopters
# never depend on a runtime network fetch (eliminates ref-resolution issues
# across caller/called workflow contexts and the truncated-200 integrity gap).
# scripts/lint-review-rubric.sh treats this file as one of four byte-parity
# carriers alongside .github/review-rubric.md, AGENTS.md, and .gemini/styleguide.md.

on:
  workflow_call:
    inputs:
      model:
        description: Claude model id to drive the review.
        type: string
        required: false
        default: claude-opus-4-7
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: Max-subscription OAuth token (no per-call API billing).
        required: true

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: review-reusable-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      # All gating runs as a step (not a job-level `if`). A job-level if that
      # dereferences github.event.pull_request.* skips the entire job on non-PR
      # callers, and skipped jobs report as success — silently hiding
      # misconfiguration (Codex P2). Step-level gating fails loud on non-PR and
      # exits cleanly (with audit) on fork/dependabot.
      - name: Gate (event / fork / dependabot)
        id: gate
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork }}
          PR_USER: ${{ github.event.pull_request.user.login }}
        run: |
          set -u
          if [ "${EVENT_NAME:-}" != "pull_request" ]; then
            echo "::error::review-reusable.yml must be called from a pull_request workflow (got event=${EVENT_NAME:-unset})" >&2
            exit 1
          fi
          if [ "${IS_FORK:-}" = "true" ]; then
            echo "::notice::Fork PR — review skipped (no secrets, prompt-injection risk)"
            echo "skip=true" >>"$GITHUB_OUTPUT"
            echo "skip_reason=fork" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${PR_USER:-}" = "dependabot[bot]" ]; then
            echo "::notice::Dependabot PR — review skipped (no secrets on pull_request)"
            echo "skip=true" >>"$GITHUB_OUTPUT"
            echo "skip_reason=dependabot" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >>"$GITHUB_OUTPUT"
          echo "skip_reason=" >>"$GITHUB_OUTPUT"

      - name: Checkout consuming repo
        if: steps.gate.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Materialize inlined rubric
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -u
          cat >/tmp/rubric-block.md <<'MUMEI_RUBRIC_INLINE_EOF'
          <!-- BEGIN universal-review-rubric -->

          ### Perspectives

          Review the diff through four focused perspectives. Treat each as a separate
          pass — finite attention per axis catches more than one monolithic sweep.

          1. **Correctness / functional suitability** — does the change do what it
             intends? Logic errors, off-by-one, inverted conditions, mishandled return
             values; edge cases (empty/null/boundary/large inputs, unexpected types);
             state invariants preserved, no partial updates, migrations safe.
          2. **Security (OWASP Top 10 / CWE)** — injection (SQL/command/template), XSS,
             SSRF, path traversal, unsafe deserialization; broken access control,
             authn/authz bypass, missing object-level checks; secrets in code/logs, weak
             crypto, sensitive-data exposure; vulnerable/outdated dependencies, supply-chain
             integrity. Treat any deterministic scanner finding supplied as input as ground truth.
          3. **Operability / reliability** — error handling at boundaries (failures
             surfaced, not silently swallowed); concurrency (shared state, races, lock
             ordering, idempotency); observability ("will we know when this breaks?" —
             logs/metrics/alerts, no sensitive data in logs); backward compatibility
             (additive changes, existing clients keep working); resource leaks / unbounded growth.
          4. **Maintainability / design** — sound design and fit within the system, not
             over-engineered; complexity that is hard to follow or bug-prone; naming,
             comments that explain WHY, consistency with surrounding code; tests
             appropriate to the change; docs updated in the same change.

          ### Grounding

          Reason from the deterministic signals provided as INPUT (static analysis,
          dependency scan, the diff, CI/test results when present), not from memory. If a
          signal is absent (e.g. no CI artifact), proceed on the rest and say so. Use the
          signals as evidence; do not let them gate which issues you consider.

          ### Bias-neutralization

          - Evaluate the change independently of what the PR description claims it does.
          - Do not assume the author's stated intent is correct; verify it against the code.
          - Do not withdraw a finding merely because the author pushes back — withdraw
            only when evidence refutes it.

          ### Precision discipline

          - Cite concrete evidence (file:line, the offending construct) for every finding.
          - No speculation. If you cannot point to evidence, do not raise it.
          - Defer concerns only observable at runtime / end-to-end rather than asserting
            them as defects; label them "needs runtime verification".
          - Severity: HIGH = exploitable / data loss / breaks a contract; MEDIUM = real
            but bounded; LOW = style / nit. Prefer fewer high-confidence findings over noise.

          ### Honest ceiling

          End every review with one line stating what this review cannot guarantee (e.g.
          runtime behavior, performance under load, issues outside the diff). AI review is
          an assist, not a guarantee.

          ### General exclusions

          - Pre-existing issues outside the diff (note them at most once, do not block).
          - Subjective style already consistent with the surrounding code.
          - Hypotheticals with no evidence in the change.
          <!-- END universal-review-rubric -->
          MUMEI_RUBRIC_INLINE_EOF
          # The heredoc preserves leading indentation from the YAML block; strip it
          # so the rubric reads as a flat markdown block in the prompt. Bash 'EOF'
          # heredocs do not strip leading whitespace, so we sed it off.
          sed -i 's/^          //' /tmp/rubric-block.md

      - name: Install grounding tools
        if: steps.gate.outputs.skip != 'true'
        id: install
        env:
          OSV_VERSION: "v2.3.8"
          OSV_SHA256: "bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc"
        # Fail-open on transient install issues (pip/curl) so a network hiccup
        # degrades to a missing-scanner audit signal rather than aborting the
        # whole review (Codex iter-5: grounding is input, not gate). SHA-256
        # MISMATCH stays hard-fail — that signals supply-chain tampering, not
        # a transient outage.
        run: |
          set -u
          semgrep_install_status=ok
          python -m pip install --quiet "semgrep==1.111.0" || semgrep_install_status="install failed"
          osv_install_status=ok
          if curl -fsSL -o /tmp/osv-scanner "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64"; then
            echo "${OSV_SHA256}  /tmp/osv-scanner" | sha256sum -c - || {
              echo "::error::osv-scanner ${OSV_VERSION} SHA-256 mismatch (release may have been retagged) — aborting (supply chain integrity)" >&2
              exit 1
            }
            chmod +x /tmp/osv-scanner
            sudo mv /tmp/osv-scanner /usr/local/bin/
          else
            osv_install_status="install failed"
          fi
          {
            echo "semgrep_install_status=${semgrep_install_status}"
            echo "osv_install_status=${osv_install_status}"
          } >>"$GITHUB_OUTPUT"

      - name: Grounding scan (input, not gate)
        if: steps.gate.outputs.skip != 'true'
        id: grounding
        env:
          SEMGREP_INSTALL_STATUS: ${{ steps.install.outputs.semgrep_install_status }}
          OSV_INSTALL_STATUS: ${{ steps.install.outputs.osv_install_status }}
        # Capture per-scanner exit code separately so the audit and prompt can
        # distinguish 'scanner ran clean (0 findings)' from 'scanner crashed'
        # (adversarial A-F-006). Fail-open semantics for findings remain.
        run: |
          set -u
          mkdir -p /tmp/grounding
          if [ "${SEMGREP_INSTALL_STATUS:-ok}" != "ok" ]; then
            semgrep_v="unknown"; semgrep_count=0; semgrep_status="install failed"
            printf '[]' >/tmp/grounding/semgrep.json
          else
            semgrep_v="$(semgrep --version 2>/dev/null | head -1 || echo unknown)"
            semgrep_rc=0
            semgrep --config=auto --json --quiet --error=0 \
              --output=/tmp/grounding/semgrep.json . || semgrep_rc=$?
            semgrep_count="$(jq '(.results // []) | length' /tmp/grounding/semgrep.json 2>/dev/null || echo 0)"
            semgrep_status="ok"
            [ "$semgrep_rc" != "0" ] && semgrep_status="crashed (rc=$semgrep_rc)"
          fi
          if [ "${OSV_INSTALL_STATUS:-ok}" != "ok" ]; then
            osv_v="unknown"; osv_count=0; osv_status="install failed"
            printf '{}' >/tmp/grounding/osv.json
          else
            osv_v="$(osv-scanner --version 2>/dev/null | head -1 || echo unknown)"
            osv_rc=0
            osv-scanner scan source --format=json --output=/tmp/grounding/osv.json . || osv_rc=$?
            osv_count="$(jq '[.results[]?.packages[]?.vulnerabilities[]?] | length' /tmp/grounding/osv.json 2>/dev/null || echo 0)"
            osv_status="ok"
            # osv-scanner exits 1 when vulns are found (not a crash) and 128 for
            # "No packages found" — also a valid outcome on repos without
            # lockfiles/SBOMs (Codex iter-2 finding). Only treat rc == 127
            # (binary missing) or rc >= 129 (signal terminations) as crashed.
            if [ "$osv_rc" = "127" ] || [ "$osv_rc" -ge 129 ]; then
              osv_status="crashed (rc=$osv_rc)"
            fi
          fi
          {
            if [ "$semgrep_status" = "ok" ]; then
              echo "semgrep ${semgrep_v}: ${semgrep_count} findings"
            else
              echo "semgrep ${semgrep_v}: SCANNER ${semgrep_status} — treat 'no findings' as unknown, do not rely on this signal"
            fi
            jq -r '(.results // [])[] | "- \(.check_id) @ \(.path):\(.start.line) — \(.extra.message // "" | tostring)"' \
              /tmp/grounding/semgrep.json 2>/dev/null | head -50
            echo ""
            if [ "$osv_status" = "ok" ]; then
              echo "osv-scanner ${osv_v}: ${osv_count} vulnerabilities"
            else
              echo "osv-scanner ${osv_v}: SCANNER ${osv_status} — treat 'no findings' as unknown, do not rely on this signal"
            fi
            jq -r '.results[]?.packages[]? | .package.name as $n | .vulnerabilities[]? | "- \($n) — \(.id) \(.summary // "")"' \
              /tmp/grounding/osv.json 2>/dev/null | head -50
          } > /tmp/grounding/summary.txt
          {
            echo "semgrep_v=${semgrep_v}"
            echo "semgrep_count=${semgrep_count}"
            echo "semgrep_status=${semgrep_status}"
            echo "osv_v=${osv_v}"
            echo "osv_count=${osv_count}"
            echo "osv_status=${osv_status}"
            echo "ci_artifacts_present=false"
          } >>"$GITHUB_OUTPUT"

      - name: Assemble Claude prompt
        if: steps.gate.outputs.skip != 'true'
        env:
          REPO_AGENTS: ${{ github.workspace }}/AGENTS.md
        run: |
          set -u
          {
            echo "REPO: ${{ github.repository }}"
            echo "PR NUMBER: ${{ github.event.pull_request.number }}"
            echo ""
            echo "You are an automated reviewer for this pull request. Apply the"
            echo "universal review rubric below. If an AGENTS.md is present in"
            echo "this repository, also apply its project-specific guidance."
            echo "Walk the four perspectives (correctness, security,"
            echo "operability, maintainability) as separate passes. Cite"
            echo "file:line evidence for every finding. Treat the grounding"
            echo "signals below as input, not as a gate over what to consider."
            echo "End the review with a one-line honest-ceiling statement of"
            echo "what this review cannot guarantee."
            echo ""
            echo "## Universal review rubric"
            cat /tmp/rubric-block.md
            if [ -f "$REPO_AGENTS" ]; then
              echo ""
              echo "## Project-specific guidance (this repo's AGENTS.md)"
              echo ""
              cat "$REPO_AGENTS"
            fi
            echo ""
            echo "## Grounding (deterministic signals — input, not gate)"
            echo ""
            cat /tmp/grounding/summary.txt
          } > /tmp/prompt.txt
          # Per-run random delimiter to defeat CWE-1336 GitHub Actions delimiter
          # injection (security F-001). belt-and-suspenders grep -Fxq rejects any
          # body line that exactly matches the random delimiter.
          delim="MUMEI_PROMPT_EOF_$(openssl rand -hex 16 2>/dev/null || date +%s%N)"
          if grep -Fxq "$delim" /tmp/prompt.txt; then
            echo "::error::prompt body collided with random delimiter (re-run)" >&2
            exit 1
          fi
          {
            printf 'PROMPT<<%s\n' "$delim"
            cat /tmp/prompt.txt
            printf '%s\n' "$delim"
          } >>"$GITHUB_ENV"

      # Defensive: verify the assembled PROMPT is populated before invoking the
      # action. GitHub's docs do show env context reading $GITHUB_ENV writes
      # from prior steps (see "Set the value / Use the value" example), but
      # this guard turns any future regression (empty prompt) from a silent
      # rubric-less review into a loud failure (Codex iter-6 P1 defence).
      - name: Verify prompt populated
        if: steps.gate.outputs.skip != 'true'
        env:
          PROMPT_LEN: ${{ env.PROMPT && 'nonempty' || 'empty' }}
        run: |
          if [ "${PROMPT_LEN:-}" != "nonempty" ]; then
            echo "::error::PROMPT env empty — prompt assembly did not propagate to env context" >&2
            exit 1
          fi

      - name: Claude review
        if: steps.gate.outputs.skip != 'true'
        id: claude
        uses: anthropics/claude-code-action@4481e6d3c7bbb88db2a928ca3444c536f589c7c1 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: ${{ env.PROMPT }}
          claude_args: |
            --model ${{ inputs.model }}
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      - name: Emit audit record to job summary
        if: always()
        env:
          SKIP: ${{ steps.gate.outputs.skip }}
          SKIP_REASON: ${{ steps.gate.outputs.skip_reason }}
          GROUNDING_SEMGREP_V: ${{ steps.grounding.outputs.semgrep_v }}
          GROUNDING_SEMGREP_COUNT: ${{ steps.grounding.outputs.semgrep_count }}
          GROUNDING_SEMGREP_STATUS: ${{ steps.grounding.outputs.semgrep_status }}
          GROUNDING_OSV_V: ${{ steps.grounding.outputs.osv_v }}
          GROUNDING_OSV_COUNT: ${{ steps.grounding.outputs.osv_count }}
          GROUNDING_OSV_STATUS: ${{ steps.grounding.outputs.osv_status }}
          CI_ARTIFACTS_PRESENT: ${{ steps.grounding.outputs.ci_artifacts_present }}
          CLAUDE_OUTCOME: ${{ steps.claude.outcome }}
        run: |
          set -u
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          sha="${{ github.event.pull_request.head.sha }}"
          if [ "${SKIP:-}" = "true" ]; then
            perspectives_line="- perspectives_run: SKIPPED (gate reason=${SKIP_REASON:-unknown})"
            grounding_block="- grounding: not run (gated)"
          else
            if [ "${CLAUDE_OUTCOME:-}" = "success" ]; then
              perspectives_line="- perspectives_run: correctness, security, operability, maintainability"
            else
              perspectives_line="- perspectives_run: INCOMPLETE (claude step outcome=${CLAUDE_OUTCOME:-unknown})"
            fi
            grounding_block="$(printf -- '- grounding tools:\n  - semgrep %s: status=%s, %s findings\n  - osv-scanner %s: status=%s, %s vulnerabilities' "${GROUNDING_SEMGREP_V:-unknown}" "${GROUNDING_SEMGREP_STATUS:-unknown}" "${GROUNDING_SEMGREP_COUNT:-0}" "${GROUNDING_OSV_V:-unknown}" "${GROUNDING_OSV_STATUS:-unknown}" "${GROUNDING_OSV_COUNT:-0}")"
          fi
          {
            echo "## Review audit record (REQ-24.12)"
            echo ""
            echo "- reviewed SHA: \`${sha:-unset}\`"
            echo "- timestamp: ${ts}"
            echo "- workflow_ref: ${{ github.workflow_ref }}"
            echo "${grounding_block}"
            echo "${perspectives_line}"
            echo "- ci_artifacts_present: ${CI_ARTIFACTS_PRESENT:-false}"
          } >>"$GITHUB_STEP_SUMMARY"
