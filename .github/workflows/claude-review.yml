name: claude-review

# Automated PR review by Anthropic's Claude Code Action, complementing the
# Codex (per-push) and Gemini (per-open) bots. Triggers on PR open AND every
# push (synchronize) — the dual-trigger Gemini lacks. Authenticates with a
# Claude Max subscription via CLAUDE_CODE_OAUTH_TOKEN (no API key, no separate
# billing). Generate the token locally with `claude setup-token` and store it
# as the CLAUDE_CODE_OAUTH_TOKEN repo secret. Do NOT also set ANTHROPIC_API_KEY:
# a static key takes precedence and would bill the API account.
#
# Structure follows the official examples/pr-review-comprehensive.yml:
# `track_progress: true` plus the inline-comment / gh tools in --allowedTools
# are what make the action actually POST findings to the PR.

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write # required by the action's GitHub token path (OIDC)

# One review per PR at a time; a newer push cancels the in-flight review so
# rapid pushes do not pile up (and do not waste subscription quota).
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Skip PRs from forks: an untrusted head could tamper with the review
    # context files (AGENTS.md / CLAUDE.md / .claude/rules), steering the
    # reviewer (prompt injection). mumei takes no external-fork PRs.
    if: github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-latest
    steps:
      - name: Require the OAuth secret
        id: guard
        env:
          TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::warning::CLAUDE_CODE_OAUTH_TOKEN not set; skipping Claude review"
            echo "skip=true" >>"$GITHUB_OUTPUT"
          fi

      - if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - if: steps.guard.outputs.skip != 'true'
        uses: anthropics/claude-code-action@4481e6d3c7bbb88db2a928ca3444c536f589c7c1 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this pull request as an automated reviewer for the mumei repository.
            Read AGENTS.md for review guidance and CLAUDE.md / .claude/rules/ for project rules.

            Focus on:
            - Correctness bugs introduced by this diff (logic errors, edge cases, races, silent failures).
            - Security (OWASP Top 10): injection, secrets, auth bypass, unsafe deserialization, SSRF.
            - mumei conventions: bash uses `set -u` and never `set -e`; functions are `mumei_`-prefixed;
              `${CLAUDE_PLUGIN_ROOT}` (never hardcoded paths); BSD-awk compatible; jq null-safe.
            - Distribution boundary: shipped artifacts (agents/ skills/ hooks/ README* AGENTS.md) must be
              English; Japanese only in HTML comments.
            - doc-sync: code changes that alter behavior must update the matching docs in the same PR.

            Provide feedback as inline comments on the specific lines for concrete issues, tagged by
            severity. Use a top-level comment for general observations. Only post findings you are highly
            confident about — skip style nits and speculation, since false positives erode trust.
          claude_args: |
            --model claude-opus-4-7
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
