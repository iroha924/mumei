# --- semgrep-release lock advisory cluster (all fixed by regenerating the lock) ---
# Shared path + assessment for the entries below:
#   cryptography / pydantic-settings / pyjwt / python-multipart / starlette are
#   transitive dependencies of the hash-pinned, frozen semgrep==1.163.0 lock in
#   .github/requirements/semgrep-release/requirements.txt, consumed only by
#   release-reusable.yml's supply-chain scan step. That step runs semgrep as a
#   CLI SAST scanner over this repo's own trusted files (sh / md / yml / json).
#   None of the exploit paths is reachable here: the scanner never runs an ASGI
#   server (no request.form / parse_form / StaticFiles / HTTPEndpoint over HTTP),
#   never parses attacker-controlled HTTP bodies or headers, never decodes JWTs,
#   never loads NestedSecrets symlinks, and never performs TLS against attacker
#   endpoints. semgrep's own use of these libs is internal, not exposed to
#   PR-author input.
# Real fix (deferred): regenerate the semgrep-release lock with cryptography>=
#   48.0.1, pydantic-settings>=2.14.2, pyjwt>=2.13.0, python-multipart>=0.0.31,
#   starlette>=1.3.1 via the Python 3.14 pip-compile toolchain documented in
#   requirements.in (out of scope for this change). The short ignoreUntil forces
#   that bump rather than letting the bypass linger.

