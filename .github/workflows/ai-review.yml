name: ai-review

# Self-hosted multi-LLM PR review tuned for AI-generated code.
#
# Architecture (see `.github/ai-review/`):
#   1. Per-LLM jobs (`gemini` + `openai`) call run-review.sh, which builds a
#      provider-agnostic prompt, hits the provider's API with strict
#      structured output (JSON schema mode), and writes findings.json + a
#      meta.json with token counts and cost.
#   2. The `aggregate` job downloads every per-LLM artifact, clusters
#      findings by (file, line ±2), tags each cluster as
#      consensus / majority / individual, and posts a single sticky status
#      comment + inline review comments for non-individual findings.
#
# Why home-grown instead of pr-agent / Qodo / CodeRabbit?
#   - AI-generated code has defect classes (hallucinated APIs, phantom
#     parameters, silent inversion, defensive overengineering, type drift)
#     that off-the-shelf reviewers don't prioritise.
#   - Multi-LLM ensemble (Mozilla AI "Star Chamber" pattern,
#     <https://blog.mozilla.ai/the-star-chamber-multi-llm-consensus-for-code-quality/>)
#     catches strictly more than single-LLM review at the cost of running
#     both providers in parallel.
#   - The prompt + schema live in this repo as source files we can iterate
#     on, not buried in a third-party container.
#
# Reusable across projects: the scripts under `.github/ai-review/` and this
# workflow are self-contained and provider-keyed via env vars. Copying both
# directories into another repo plus setting GEMINI_API_KEY / OPENAI_KEY
# secrets enables the same pipeline elsewhere.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - GEMINI_API_KEY  (Google AI Studio)
#   - OPENAI_KEY      (OpenAI Platform)
# `GITHUB_TOKEN` is supplied automatically.
#
# Cost (verified 2026-05-28 from provider pricing pages):
#   - Gemini 3.1 Pro Preview: $2  in / $12 out per 1M tokens (prompts <=200k)
#     <https://ai.google.dev/gemini-api/docs/pricing>
#   - GPT-5.5:                $5  in / $30 out per 1M tokens (standard tier)
#     <https://developers.openai.com/api/docs/pricing>
# Prompt caching (system + project context) reduces input cost ~10x on both
# providers (Gemini cached: $0.20/M, OpenAI cached: $0.50/M).

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write # also covers issue-comments on PRs (sticky status)

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

# Skip fork PRs: GitHub does not pass repo secrets to workflows triggered by
# pull_request from forks, so GEMINI_API_KEY / OPENAI_KEY would be empty and
# every run would fail with HTTP 401. Maintainers can re-run after merging
# the fork into a same-repo branch if a review is needed.
jobs:
  gemini:
    name: review (gemini-3.1-pro)
    if: ${{ github.event.sender.type != 'Bot' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      LLM_PROVIDER: gemini
      LLM_MODEL: gemini-3.1-pro-preview
      LLM_DISPLAY_NAME: Gemini 3.1 Pro
      INPUT_PRICE_PER_M: "2"
      OUTPUT_PRICE_PER_M: "12"
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      OUT_DIR: ${{ github.workspace }}/.ai-review-out
    steps:
      # Check out the BASE ref (not the PR head) so a malicious or
      # accidentally-broken PR cannot modify run-review.sh to exfiltrate
      # the LLM API keys this step exposes. The PR diff being reviewed
      # is fetched via the GitHub API inside the script, so no PR-head
      # code is executed here. (Flagged as CONSENSUS / critical by both
      # LLM reviewers — supply-chain security.)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Run Gemini review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: .github/ai-review/run-review.sh

      # `if: always()` so the failure-marker findings.json + meta.json
      # written by run-review.sh on a non-zero exit also make it to the
      # aggregate job, which then renders the `⚠ status` row instead of
      # silently dropping the failed provider.
      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-review-gemini
          path: ${{ env.OUT_DIR }}
          retention-days: 1
          if-no-files-found: error
          # OUT_DIR is a dot-prefixed dir (.ai-review-out); upload-artifact
          # excludes hidden paths by default since v4.4, so opt back in.
          include-hidden-files: true

  openai:
    name: review (gpt-5.5)
    if: ${{ github.event.sender.type != 'Bot' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-5.5
      LLM_DISPLAY_NAME: GPT-5.5
      INPUT_PRICE_PER_M: "5"
      OUTPUT_PRICE_PER_M: "30"
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      OUT_DIR: ${{ github.workspace }}/.ai-review-out
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Run OpenAI review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
        run: .github/ai-review/run-review.sh

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ai-review-openai
          path: ${{ env.OUT_DIR }}
          retention-days: 1
          if-no-files-found: error
          # OUT_DIR is a dot-prefixed dir (.ai-review-out); upload-artifact
          # excludes hidden paths by default since v4.4, so opt back in.
          include-hidden-files: true

  aggregate:
    name: aggregate review
    needs: [gemini, openai]
    if: ${{ always() && github.event.sender.type != 'Bot' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
      STATUS_MARKER: "<!-- ai-review-status -->"
      INPUT_DIR: ${{ github.workspace }}/.ai-review-in
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Download all per-LLM artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ env.INPUT_DIR }}

      - name: Aggregate + post
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/ai-review/aggregate-and-post.sh
