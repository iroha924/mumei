name: gitleaks-weekly

# Weekly full-repository gitleaks scan. The on-commit gitleaks check
# in ci.yml only inspects the diff of the current PR; this workflow
# rescans the entire history each week so newly published rule
# updates apply retroactively to the repo's full timeline.
#
# Findings open issues in the repo's Security tab. A non-zero exit
# fails the workflow so the schedule alert surfaces in the actions
# log even if the issues feed is unread.

on:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: gitleaks (full history)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
