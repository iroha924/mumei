name: scorecards

# OpenSSF Scorecard checks. Publishes a SARIF report to GitHub's
# Security tab and a JSON results file readable by both CI and any
# external consumer that wants to verify mumei's posture before
# installing the plugin. Runs weekly to keep the badge fresh; PR
# evaluation requires `pull_request` separately and is not scoped here
# (the action runs against the default branch only).

on:
  branch_protection_rule:
  schedule:
    - cron: "0 4 * * 1"
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: "Run analysis"
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: "Upload artifact"
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5

      - name: "Upload to code-scanning"
        uses: github/codeql-action/upload-sarif@0daab03d71ff584ef619d027a3fd9146679c5d84 # v3
        with:
          sarif_file: results.sarif
