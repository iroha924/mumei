# lychee link checker config
# Reference: https://lychee.cli.rs/usage/config/

# Max number of redirects to follow before failing.
max_redirects = 5

# Per-link request retries before flagging as broken.
max_retries = 5

# Timeout per link (seconds). Defaults to 20.
# Set high to absorb transient slowness from external services
# (contributor-covenant.org and similar non-CDN-backed sites).
timeout = 60

# Accept these HTTP status codes as success in addition to 200/204.
# 403: rate-limited public archives (some readme links).
# 429: rate limit; we already retry, treat as transient.
# 206: partial content (some CDNs).
accept = ["200", "204", "206", "403", "429"]

# Skip checking these patterns. Anchor links inside the same file are usually
# noise for a CI gate; URLs only.
exclude_path = [
  ".mumei/",
  "docs/",
  "node_modules/",
  ".git/",
  # Audit prompt files. URLs here are fetched by Claude at runtime via
  # WebFetch (with its own retry/error handling); they do not need to be
  # liveness-checked at commit time, and including them roughly doubles the
  # external request load lychee makes per CI run.
  ".github/audit-prompts/",
  # release-please-generated CHANGELOG.md: contains self-referential
  # `compare/vX.Y.Z...vN.N.N` URLs that 404 until the tag is pushed (which
  # only happens at release PR merge), and auto-generated `#N` links from
  # commit messages that GitHub renders as issue links even when the
  # original `#N` referred to a code-scanning alert.
  "CHANGELOG.md",
]

# Skip URLs that have a long history of flaky network errors in CI (not
# 4xx / 5xx — those would be legitimate breakage). Connection reset by peer
# from contributor-covenant.org has caused ~40% of recent CI failures
# (see run history). Keep this list tight; prefer fixing upstream.
exclude = [
  "contributor-covenant\\.org",
  # `/network/updates` is the Dependabot badge target. The path 404s on
  # repos where Dependabot has not yet completed its first scan, even
  # though the badge image itself is the documented Dependabot URL. It
  # resolves once Dependabot runs against the SHA-pinned actions added
  # in REQ-8 Wave 2.
  "github\\.com/iroh4-labs/mumei/network/updates",
  # slsa.dev intermittently fails TLS handshake from GitHub-hosted
  # runners (~5-10% of recent runs). The page is real and stable; the
  # network path between Azure runners and the SLSA host is the flake.
  "slsa\\.dev/spec/",
  # scorecard.dev viewer occasionally drops the connection from CI
  # runners (Connection failed, no HTTP response). The badge URL is
  # documented and the page is real; transient network issue between
  # runners and the host. Pattern matches both / and ?uri= forms.
  "scorecard\\.dev/viewer",
  # www.sigstore.dev is a CNAME to sigstore.netlify.app (AWS Singapore
  # region IPs). Same flake pattern as slsa.dev and scorecard.dev:
  # Connection failed from GitHub-hosted runners during Netlify CDN
  # regional incidents. The page is real and stable; the runner ->
  # Netlify path is the flake.
  "www\\.sigstore\\.dev",
]

# Local-only file:// or relative anchor checks. "none" focuses on http(s);
# valid values are "none" / "anchor-only" / "text-only" / "full"
# (lychee 0.24+ replaced the boolean form with this tristate enum).
include_fragments = "none"

# Localhost links cannot be reached from CI runners.
exclude_loopback = true

# GitHub Actions cache: lychee re-uses the cache across runs to avoid hammering
# external services on every push. The cache is keyed on the URL set.
cache = true
max_cache_age = "7d"
