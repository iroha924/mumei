# Taskfile for the mumei-dashboard sub-project (unscoped npm package).
#
# Included from the root Taskfile.yml as `dashboard:` namespace with
# `dir: ./dashboard`, so `task dashboard:test` from the repo root is
# equivalent to `cd dashboard && task test` here.
#
# This file delegates to package.json scripts (the source of truth)
# rather than re-implementing them. npm scripts stay invocable
# directly, which keeps the dashboard's own tooling (Vite / Vitest /
# Biome) discoverable via `npm run` for contributors who never use Task.

version: "3"

set: [pipefail]
silent: true

tasks:
  default:
    desc: List available dashboard tasks
    cmds:
      - task --list

  install:
    desc: "npm ci --prefer-offline (idempotent; skipped if package-lock.json unchanged)"
    cmds:
      - npm ci --prefer-offline
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules/.package-lock.json

  dev:
    desc: "Start dev (Fastify watch + Vite hot-reload, concurrently)"
    deps: [install]
    cmds:
      - npm run dev

  typecheck:
    desc: "tsc -b --noEmit on src/ + server/"
    deps: [install]
    cmds:
      - npm run typecheck

  lint:
    desc: "biome check --error-on-warnings"
    deps: [install]
    cmds:
      - npm run lint

  lint:fix:
    desc: "biome check --write (auto-fix)"
    deps: [install]
    cmds:
      - npm run lint:fix

  test:
    desc: "vitest run (one-shot)"
    deps: [install]
    cmds:
      - npm run test

  test:watch:
    desc: "vitest watch"
    deps: [install]
    cmds:
      - npm run test:watch

  schemas:
    desc: "Regenerate ../schemas/*.schema.json from src/schemas/*.ts (TypeBox canonical)"
    deps: [install]
    cmds:
      - npm run schemas
    sources:
      - src/schemas/*.ts
      - scripts/generate-schemas.ts
    generates:
      - ../schemas/*.schema.json

  build:
    desc: "Production build (tsc -b + vite build + tsup server). tsc -b inside `npm run build` does typecheck-equivalent work; do not chain `task dashboard:typecheck` before this in CI."
    deps: [install]
    cmds:
      - npm run build
    sources:
      - src/**/*.{ts,tsx,css}
      - server/**/*.ts
      - public/**/*
      - index.html
      - vite.config.ts
      - tsup.config.ts
      - tsconfig*.json
      - package.json
      - package-lock.json
    generates:
      - dist/**/*

  preview:
    desc: "vite preview (serve the production build locally)"
    cmds:
      - npm run preview

  validate:
    desc: "Pre-PR full check for dashboard (typecheck + lint + test + schemas drift)"
    cmds:
      - task: typecheck
      - task: lint
      - task: test
      - task: schemas
      - |
        # schemas drift check: if `npm run schemas` regenerated ../schemas/*.schema.json
        # differently from the committed canonical, the TypeBox sources and the
        # committed JSON are out of sync. Fail loudly.
        if ! git -C .. diff --quiet -- schemas/; then
          echo "::error::generated schemas differ from committed schemas/. Run 'task dashboard:schemas' and commit the result." >&2
          git -C .. --no-pager diff -- schemas/ >&2
          exit 1
        fi
