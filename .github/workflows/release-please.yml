name: release-please

# Automated release flow. release-please-action analyses Conventional
# Commits on `main`, maintains a "release PR" per package (plugin root +
# dashboard/), and pushes a tag when the maintainer merges that PR.
#
# The existing release.yml / release-dashboard.yml workflows pick up
# the tag push (`v*` and `dashboard-v*` respectively) and perform
# build + sign + SBOM + publish. Nothing in those workflows changed.
#
# Token: secrets.RELEASE_PLEASE_TOKEN (a fine-grained PAT with Contents
# and Pull requests Read+Write on this repo) is required — the release PR
# created by the action must trigger branch-protection-required CI runs,
# and GitHub deliberately suppresses workflow runs on PRs authored via
# the default GITHUB_TOKEN. With RELEASE_PLEASE_TOKEN supplied the
# action holds its own credentials, so the workflow can run with
# read-only GITHUB_TOKEN scope (the contents:write permission scorecard
# would otherwise flag is unnecessary here).

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json
