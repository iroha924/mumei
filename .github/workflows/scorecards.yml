name: scorecards

# OpenSSF Scorecards. Kept as a separate workflow because the
# scorecard action rejects workflows that declare global env / defaults
# (https://github.com/ossf/scorecard-action#workflow-restrictions),
# which ci.yml has (`FORCE_JAVASCRIPT_ACTIONS_TO_NODE24`). Bundling
# scorecards into ci.yml triggered the action's verification gate, so
# scorecards stays alone.

on:
  branch_protection_rule:
  schedule:
    - cron: "0 4 * * 1"
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: SARIF file
          path: results.sarif
          retention-days: 5
      - name: Upload to code-scanning
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3
        with:
          sarif_file: results.sarif

  # Active failure signal for scheduled runs: GitHub only emails the last
  # workflow-file committer on cron failures, which is easy to miss. Open a
  # deduped ci-fail issue instead so the failure lands in the issue list.
  notify-cron-failure:
    if: failure() && github.event_name == 'schedule'
    needs: [analysis]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open ci-fail issue (deduped)
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          title="ci-fail: scheduled ${WORKFLOW} run failed"
          existing="$(gh issue list --repo "${GITHUB_REPOSITORY}" --state open --label ci-fail --search "in:title \"${title}\"" --json number --jq 'length')"
          if [ "${existing}" -gt 0 ]; then
            echo "open ci-fail issue already exists for this workflow; skipping"
            exit 0
          fi
          gh issue create --repo "${GITHUB_REPOSITORY}" --title "${title}" --label ci-fail \
            --body "Scheduled run failed: ${RUN_URL}"
