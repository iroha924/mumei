name: release-reusable

# Reusable release pipeline. Invoked by .github/workflows/release.yml on
# every annotated tag push. The pipeline is intentionally split out of
# the caller workflow so the high-privilege jobs (signing, provenance,
# release upload) sit behind the `release` GitHub Environment, which
# requires manual approval. The caller's job is only "kick this off
# when a tag arrives"; everything below — including secret access — is
# gated by `environment: release`.
#
# Pipeline stages (per the REQ-8 design):
#   1. Pre-flight SAST scans (semgrep, gitleaks, trufflehog)
#      Block release on HIGH-severity findings before signing or upload.
#   2. plugin.json schema strict validation.
#   3. Build tarball + SHA256.
#   4. CycloneDX SBOM via anchore/sbom-action.
#   5. Sigstore keyless signing via cosign sign-blob.
#   6. SLSA provenance via slsa-framework/slsa-github-generator (reusable).
#   7. Publish: gh release upload of tarball + .sig + SBOM + provenance + hash.

on:
  workflow_call:
    inputs:
      tag:
        description: "The tag to release (e.g. v0.3.0)."
        required: true
        type: string
    outputs:
      hashes:
        description: "base64-encoded sha256sum of the release tarball, in the SLSA generator subject format."
        value: ${{ jobs.build.outputs.hashes }}

permissions:
  contents: read

# Force every Node 20-based action (gitleaks-action v2.x, transitive
# softprops/action-gh-release in SLSA) onto Node 24. The October 2026
# Node 20 removal will otherwise hard-fail these actions; opt in early
# so the workflow's behavior is the same before and after the runner
# change-over.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  preflight:
    name: pre-flight scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
          persist-credentials: false

      # Pin Python so the hash-locked install matches the version pip-compile
      # used to resolve the dependency graph (.github/requirements/*/
      # requirements.in regen comments). Without this, the runner's system
      # python3 (3.12 on ubuntu-24.04) silently diverges from the compile
      # environment (3.14), and a future transitive dep with
      # `Requires-Python: >=3.13` would fail at install with a cryptic
      # "no matching distribution" rather than a clean version mismatch.
      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: semgrep
        # Pinned independently of review-reusable.yml's semgrep (1.111.0):
        # release-time scan prioritises current OWASP / security-audit rule
        # coverage at tag-cut time, while the review pipeline's semgrep is
        # frozen at 1.111.0 to keep AI grounding signal stable across runs.
        # See .github/requirements/semgrep-release/requirements.in for the
        # regen command; the other pin moves on its own cadence via
        # .github/requirements/semgrep-review/.
        run: |
          python3 -m pip install --quiet --require-hashes -r .github/requirements/semgrep-release/requirements.txt
          semgrep --error --config=p/owasp-top-ten --config=p/security-audit --severity=ERROR .

      - name: gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: trufflehog
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          path: ./
          # Pin docker image tag (action invokes ghcr.io/.../trufflehog:${VERSION}).
          version: "3.95.3"
          extra_args: --results=verified

      - name: Verify CodeQL + Scorecards passed for the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag }}
        run: |
          set -u
          # Resolve the tag to a commit SHA, then ask GitHub for the
          # check-runs attached to that exact commit. This couples the
          # gate to the code being released; unrelated PR runs / older
          # main runs do not interfere.
          tag_sha="$(git rev-list -n1 "${TAG}")"
          if [ -z "$tag_sha" ]; then
            echo "::error::cannot resolve ${TAG} to a commit SHA"
            exit 1
          fi

          # Race: tag-push and main-push fire near-simultaneously, so the
          # release workflow can start while ci.yml's codeql / scorecards
          # are still in_progress / queued. Poll up to 20 minutes for each
          # required check-run, accepting in_progress / queued as
          # transient and only failing on (completed AND not-success) or
          # genuine absence.
          # `codeql (` covers every CodeQL language (the job runs under
          # ci.yml as `codeql (actions)`). `scorecard analysis` is
          # the literal Scorecards run name.
          poll_check_prefix() {
            local prefix="$1"
            local deadline=$(( $(date +%s) + 1200 )) # 20 min
            local payload err name status concl row sleep_for=15
            while :; do
              err="$(mktemp)"
              if ! payload="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${tag_sha}/check-runs" \
                --paginate --jq ".check_runs[] | select(.name | startswith(\"${prefix}\")) | {name, status, conclusion}" 2>"$err")"; then
                echo "::warning::gh api transient failure for prefix '${prefix}': $(cat "$err")"
                rm -f "$err"
                if [ "$(date +%s)" -gt "$deadline" ]; then
                  echo "::error::timeout polling check prefix '${prefix}' on ${tag_sha}"
                  return 1
                fi
                sleep "$sleep_for"
                continue
              fi
              rm -f "$err"

              # No matching check-runs yet — codeql/scorecards has not
              # registered on this commit. Wait and retry.
              if [ -z "$payload" ]; then
                if [ "$(date +%s)" -gt "$deadline" ]; then
                  echo "::error::no check-run starting with '${prefix}' on ${tag_sha} after 20 min"
                  return 1
                fi
                echo "waiting for '${prefix}' to register on ${tag_sha}..."
                sleep "$sleep_for"
                continue
              fi

              # Walk matches; if any are not yet completed, wait. If any
              # completed-but-not-success, fail immediately.
              local pending=0
              while IFS= read -r row; do
                [ -n "$row" ] || continue
                name="$(printf '%s' "$row" | jq -r '.name')"
                status="$(printf '%s' "$row" | jq -r '.status')"
                concl="$(printf '%s' "$row" | jq -r '.conclusion // ""')"
                if [ "$status" != "completed" ]; then
                  pending=$((pending + 1))
                elif [ "$concl" != "success" ]; then
                  echo "::error::check '${name}' on ${tag_sha} is not green (status=${status} conclusion=${concl})"
                  return 1
                fi
              done <<<"$payload"
              if [ "$pending" -eq 0 ]; then
                echo "all '${prefix}' check-runs on ${tag_sha} are green"
                return 0
              fi
              if [ "$(date +%s)" -gt "$deadline" ]; then
                echo "::error::timeout: ${pending} '${prefix}' check-run(s) still pending on ${tag_sha} after 20 min"
                return 1
              fi
              echo "waiting (${pending} pending) for '${prefix}' to complete on ${tag_sha}..."
              sleep "$sleep_for"
            done
          }

          for check_prefix in "codeql (" "scorecard analysis"; do
            poll_check_prefix "$check_prefix" || exit 1
          done

  validate-manifest:
    name: validate plugin.json
    runs-on: ubuntu-latest
    needs: preflight
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      # `needs: preflight` only orders the jobs — it does not carry the
      # preflight runner's `actions/setup-python` over. validate-manifest
      # runs on a fresh ubuntu-latest runner, so re-pin Python here so
      # the hash-locked install on line 213 resolves on the same
      # interpreter pip-compile used for the lock (3.14).
      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Strict schema validation (vendored schema)
        # The release path validates against schemas/plugin.schema.json — a
        # vendored copy of https://json.schemastore.org/claude-code-plugin-manifest.json
        # checked into the repo. This decouples tag-push releases from
        # json.schemastore.org's TLS / DNS / 5xx availability. Drift is
        # detected by .github/workflows/plugin-json-validate.yml on PRs
        # that touch the manifest / vendored schema AND on a weekly cron
        # (added in review iter 1 adv-F-004 fix) so upstream schema
        # changes surface even without a mumei manifest PR. On drift the
        # operator refreshes schemas/plugin.schema.json and bumps the
        # manifest $schema field together.
        run: |
          # Pin jsonschema (and the validate-side requests dep) via
          # .github/requirements/validate/requirements.txt — hash-locked
          # so a yanked or tampered tarball is rejected at install. Same
          # lock backs plugin-json-validate.yml; bump via Dependabot pip
          # ecosystem (drift is intentional, gated by both workflows).
          # Python is pinned to 3.14 by the setup-python step above so
          # the install resolves on the same interpreter pip-compile
          # used for the lock.
          python3 -m pip install --quiet --require-hashes -r .github/requirements/validate/requirements.txt
          python3 - <<'PY'
          import json, sys
          from pathlib import Path
          import jsonschema
          EXPECTED_SCHEMA_URL = "https://json.schemastore.org/claude-code-plugin-manifest.json"
          manifest = json.loads(Path(".claude-plugin/plugin.json").read_text(encoding="utf-8"))
          schema_url_in_manifest = manifest.get("$schema")
          if schema_url_in_manifest != EXPECTED_SCHEMA_URL:
              print(f"::error::plugin.json $schema mismatch: expected {EXPECTED_SCHEMA_URL}, got {schema_url_in_manifest!r}")
              print("::error::if the upstream schema URL has changed, refresh schemas/plugin.schema.json and bump the manifest $schema field.")
              sys.exit(1)
          schema_path = Path("schemas/plugin.schema.json")
          if not schema_path.is_file():
              print(f"::error::vendored schema missing: {schema_path}")
              print(f"::error::run: curl -sL {EXPECTED_SCHEMA_URL} -o {schema_path}")
              sys.exit(1)
          schema = json.loads(schema_path.read_text(encoding="utf-8"))
          jsonschema.validators.validator_for(schema).check_schema(schema)
          validator = jsonschema.validators.validator_for(schema)(schema)
          errors = sorted(validator.iter_errors(manifest), key=lambda e: list(e.absolute_path))
          if errors:
              for e in errors:
                  path = "/".join(str(p) for p in e.absolute_path) or "(root)"
                  print(f"::error::plugin.json {path}: {e.message}")
              sys.exit(1)
          print(f"plugin.json valid against vendored {schema_path} (mirrors {EXPECTED_SCHEMA_URL})")
          PY

  build:
    name: build tarball
    runs-on: ubuntu-latest
    needs: [preflight, validate-manifest]
    permissions:
      contents: read
    outputs:
      tarball: ${{ steps.archive.outputs.tarball }}
      hash: ${{ steps.archive.outputs.hash }}
      hashes: ${{ steps.archive.outputs.hashes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Create tarball + SHA256
        id: archive
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -eu
          tarball="mumei-${TAG}.tar.gz"
          git archive --format=tar.gz --prefix="mumei-${TAG}/" "${TAG}" -o "${tarball}"
          hash="$(sha256sum "${tarball}" | awk '{print $1}')"
          echo "tarball=${tarball}" >>"$GITHUB_OUTPUT"
          echo "hash=${hash}" >>"$GITHUB_OUTPUT"
          # SLSA generator expects the literal `sha256sum`-style output
          # base64-encoded as a single line. Match the canonical SLSA
          # `hashes=$(sha256sum *.tar.gz | base64 -w0)` shape exactly so
          # the upstream secure-download / verification path matches.
          hashes="$(sha256sum "${tarball}" | base64 -w0)"
          echo "hashes=${hashes}" >>"$GITHUB_OUTPUT"

      - name: Upload tarball artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: tarball
          path: ${{ steps.archive.outputs.tarball }}
          retention-days: 1

  sbom:
    name: generate SBOM
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          format: cyclonedx-json
          output-file: mumei-sbom.cdx.json
          path: .
          # The downstream `publish` job uploads the SBOM (and tarball
          # + signature) to the GitHub Release in a single atomic step
          # via `gh release upload`. Letting sbom-action also upload
          # would (a) duplicate work and (b) require contents:write on
          # this job, which we deliberately avoid (least privilege).
          upload-release-assets: false

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: mumei-sbom.cdx.json
          retention-days: 1

  sign:
    name: keyless sign tarball
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    environment: release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tarball

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign tarball (keyless)
        env:
          TARBALL: ${{ needs.build.outputs.tarball }}
        run: |
          cosign sign-blob --yes \
            --bundle "${TARBALL}.cosign.bundle" \
            "${TARBALL}"

      - name: Upload signature artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signature
          path: ${{ needs.build.outputs.tarball }}.cosign.bundle
          retention-days: 1

  # SLSA provenance lives in release.yml (the caller). Calling the
  # SLSA reusable workflow from inside another reusable workflow
  # (nested `uses:`) breaks artifact namespace propagation: the
  # generator job's `provenance-name` output reaches its sibling
  # upload-assets job as empty, secure-download-artifact then receives
  # `UNTRUSTED_PATH=` and exits 1, so the upload silently produces a
  # release without provenance even though every job's `conclusion`
  # is success. Standard SLSA usage is sibling-of-build at the top
  # level — release.yml follows that pattern instead.

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: [build, sbom, sign]
    permissions:
      contents: write
    environment: release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}
          persist-credentials: false

      - name: Download tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: tarball

      - name: Download SBOM
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: sbom

      - name: Download signature
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: signature

      # SLSA provenance is uploaded directly to the GitHub Release by
      # the slsa-github-generator workflow (`upload-assets: true`),
      # so we no longer need to re-download it here.

      - name: Compose release notes
        env:
          TARBALL: ${{ needs.build.outputs.tarball }}
          HASH: ${{ needs.build.outputs.hash }}
        run: |
          {
            echo "## Verification"
            echo ""
            echo "Verify the tarball against the published SHA256:"
            echo ""
            echo '```'
            echo "${HASH}  ${TARBALL}"
            echo '```'
            echo ""
            echo "Or via cosign (Sigstore keyless):"
            echo ""
            echo '```'
            echo "cosign verify-blob \\"
            echo "  --bundle ${TARBALL}.cosign.bundle \\"
            echo "  --certificate-identity-regexp '^https://github.com/${GITHUB_REPOSITORY}/\\.github/workflows/release-reusable\\.yml@refs/tags/' \\"
            echo "  --certificate-oidc-issuer https://token.actions.githubusercontent.com \\"
            echo "  ${TARBALL}"
            echo '```'
          } >release-notes.md

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          TARBALL: ${{ needs.build.outputs.tarball }}
        run: |
          set -eu
          # Always sync release notes with current artifacts. On retag,
          # `gh release view` succeeds, so we MUST `gh release edit` —
          # otherwise the notes carry the previous run's SHA256 while
          # `--clobber` writes a new tarball with a different hash, and
          # users following the verification commands see FAILED hashes
          # indistinguishable from a tampering signal.
          if gh release view "${TAG}" >/dev/null 2>&1; then
            # Refuse to overwrite a draft (manual staging or a prior
            # half-finished run). Without this guard, --clobber writes
            # assets to the draft, the workflow exits 0, and consumers
            # see no published release.
            is_draft="$(gh release view "${TAG}" --json isDraft --jq .isDraft)"
            if [ "$is_draft" = "true" ]; then
              echo "::error::release ${TAG} exists as draft; refusing to overwrite. Resolve manually before retag."
              exit 1
            fi
            gh release edit "${TAG}" --notes-file release-notes.md --draft=false
          else
            gh release create "${TAG}" --title "${TAG}" --notes-file release-notes.md
          fi
          # SLSA provenance (*.intoto.jsonl) is already attached by the
          # slsa-github-generator workflow itself; this step uploads
          # only the artifacts the generator does not handle.
          gh release upload "${TAG}" \
            "${TARBALL}" \
            "${TARBALL}.cosign.bundle" \
            "mumei-sbom.cdx.json" \
            --clobber
