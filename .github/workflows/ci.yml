name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ─────────────────────────────────────────
      # bash の静的解析。GitHub Actions runner には shellcheck がプリインストール済。
      # ─────────────────────────────────────────
      - name: shellcheck (hooks/*.sh + hooks/_lib/*.sh + scripts/*.sh)
        run: |
          shellcheck hooks/_lib/*.sh hooks/*.sh scripts/*.sh

      # ─────────────────────────────────────────
      # bash syntax check (shellcheck では拾えないケースの保険)
      # ─────────────────────────────────────────
      - name: bash -n
        run: |
          for f in hooks/_lib/*.sh hooks/*.sh scripts/*.sh; do
            bash -n "$f" || { echo "FAIL: $f"; exit 1; }
          done

      # ─────────────────────────────────────────
      # bash function prefix discipline (mumei_ / _mumei_ 必須)
      # 3 種の関数定義 syntax をすべて検出: name(), name (), function name [{|()]
      # tests/ は対象外 (bats fixture 関数があるため)
      # ─────────────────────────────────────────
      - name: verify mumei_ prefix on bash functions
        run: |
          set -euo pipefail
          bad="$(awk '
            # name() / name () (whitespace allowed before "(")
            /^[a-zA-Z_][a-zA-Z0-9_]*[[:space:]]*\(\)/ {
              n = $0; sub(/[[:space:]]*\(\).*$/, "", n)
              if (n !~ /^(mumei_|_mumei_)/) printf "%s:%d: %s\n", FILENAME, NR, $0
              next
            }
            # function name [{|()]   — Korn-style declaration
            /^function[[:space:]]+[a-zA-Z_][a-zA-Z0-9_]*([[:space:]]|\(|\{)/ {
              n = $0; sub(/^function[[:space:]]+/, "", n); sub(/[[:space:]\(\{].*$/, "", n)
              if (n !~ /^(mumei_|_mumei_)/) printf "%s:%d: %s\n", FILENAME, NR, $0
              next
            }
          ' hooks/_lib/*.sh hooks/*.sh scripts/*.sh || true)"
          if [ -n "$bad" ]; then
            echo "::error::Non-prefixed function definitions found in hooks/ or scripts/:" >&2
            printf '%s\n' "$bad" >&2
            exit 1
          fi
          echo "all functions use mumei_ / _mumei_ prefix (covers name(), name (), function name)"

      # ─────────────────────────────────────────
      # JSON validation
      # ─────────────────────────────────────────
      - name: jq empty (manifest, hooks)
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty hooks/hooks.json

      # ─────────────────────────────────────────
      # 配布物 frontmatter check
      # ─────────────────────────────────────────
      - name: agent frontmatter check
        run: |
          set -euo pipefail
          fail=0
          for f in agents/*.md; do
            # head -1 を bash 組み込み比較で確認 (grep は '---' をオプション扱いするため使わない)
            [[ "$(head -1 "$f")" == "---" ]] || { echo "FAIL: $f - missing frontmatter"; fail=1; continue; }
            fm="$(awk '/^---$/{c++; next} c==1' "$f")"
            for required in name description model; do
              printf '%s' "$fm" | grep -qE "^${required}:" || { echo "FAIL: $f - missing field: ${required}"; fail=1; }
            done
            for forbidden in hooks mcpServers permissionMode; do
              if printf '%s' "$fm" | grep -qE "^${forbidden}:"; then
                echo "FAIL: $f - forbidden plugin-agent field: ${forbidden}"
                fail=1
              fi
            done
          done
          [[ "$fail" == "0" ]]

      - name: skill frontmatter check
        run: |
          set -euo pipefail
          fail=0
          while IFS= read -r f; do
            [[ "$(head -1 "$f")" == "---" ]] || { echo "FAIL: $f - missing frontmatter"; fail=1; continue; }
            fm="$(awk '/^---$/{c++; next} c==1' "$f")"
            printf '%s' "$fm" | grep -qE '^description:' || { echo "FAIL: $f - missing description"; fail=1; }
          done < <(find skills -name SKILL.md)
          [[ "$fail" == "0" ]]

      # ─────────────────────────────────────────
      # 配布物 README / LICENSE 存在確認
      # ─────────────────────────────────────────
      - name: required top-level files
        run: |
          [[ -f README.md ]] || { echo "FAIL: README.md missing"; exit 1; }
          [[ -f LICENSE ]] || { echo "FAIL: LICENSE missing"; exit 1; }
          [[ -f .claude-plugin/plugin.json ]] || { echo "FAIL: plugin.json missing"; exit 1; }

  # ─────────────────────────────────────────
  # CI-only checks (REQ-5 Wave 3): things developers should NOT have to run
  # on every local commit because they hit the network or pull a release
  # binary on demand. The format / lint / test suite that runs on every
  # commit lives in `.pre-commit-config.yaml`; CONTRIBUTING.md instructs
  # contributors to `pre-commit install` so commits are gated locally
  # (the global no `--no-verify` rule prevents bypass). Duplicating those
  # hooks in CI would be redundant; instead we cover the gaps here.
  # ─────────────────────────────────────────
  lint-extra:
    runs-on: ubuntu-latest
    # Minimum permissions per GitHub hardening guide
    # (https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      # markdownlint / typos / shfmt / actionlint / gitleaks are required by
      # REQ-5.6 to run on every PR / main push. They also live in
      # .pre-commit-config.yaml for local-commit gating, but CI re-runs them
      # so the SHALL-clause holds even if a contributor hasn't installed
      # pre-commit (and required-status enforcement reaches branch protection).

      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md
            !**/node_modules/**
          config: .markdownlint-cli2.jsonc

      - name: typos
        uses: crate-ci/typos@v1.46.0

      - name: shfmt (shell format)
        run: |
          set -e
          mkdir -p /tmp/shfmt
          curl -sLo /tmp/shfmt/shfmt \
            "https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64"
          chmod +x /tmp/shfmt/shfmt
          /tmp/shfmt/shfmt -d -i 2 hooks/_lib/*.sh hooks/*.sh scripts/*.sh

      - name: actionlint
        id: get_actionlint
        run: bash <(curl -sL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
        shell: bash
      - name: actionlint check
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # lychee is heavy and rate-limit-sensitive; keep it out of pre-commit
      # (developer commits should not hammer external sites) but gate CI on it.
      # All knobs (max_retries, timeout, accept-list, exclude_path) live in
      # lychee.toml as the single source of truth — no CLI flags here, since
      # lychee's CLI args would silently override the toml.
      - name: lychee (link check)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # semgrep self-scan (REQ-5.14): dogfood SAST against the mumei codebase.
      # Distinguish semgrep's exit codes (1 = findings, !=0,!=1 = infra failure)
      # so docker pull rate-limits / image moves are not misattributed as
      # "findings". Advisory: docker pull failures are still warnings, never
      # block the lint-extra job.
      - name: semgrep self-scan (advisory)
        run: |
          set +e
          docker run --rm -v "${PWD}:/src" -w /src semgrep/semgrep \
            semgrep scan --config=auto --error --quiet
          rc=$?
          if (( rc == 0 )); then
            echo "semgrep: clean run, no findings"
          elif (( rc == 1 )); then
            echo "::warning::semgrep self-scan reported findings (advisory; review manually)"
          else
            echo "::warning::semgrep step infra failure (rc=$rc — likely docker pull rate limit, image moved, or registry outage; not a code finding)"
          fi
          exit 0

      # shellharden has no first-party pre-commit hook; install the release
      # binary and run it as a CI-only check. shellcheck (which IS in
      # pre-commit) catches bugs; shellharden enforces quoting — complementary.
      - name: shellharden (quoting hardening)
        run: |
          set -e
          mkdir -p /tmp/shellharden
          curl -sLo /tmp/shellharden/sh.tar.gz \
            "https://github.com/anordal/shellharden/releases/download/v4.3.1/shellharden-x86_64-unknown-linux-gnu.tar.gz"
          tar -xzf /tmp/shellharden/sh.tar.gz -C /tmp/shellharden
          chmod +x /tmp/shellharden/shellharden
          # NOTE: hooks/_lib/detectors.sh is excluded — shellharden v4.3.1 parser
          # raises "Unexpected end of file" on it (see follow-up tracked in
          # memory/req6-language-convention-fix.md). All other shell sources are
          # still gated.
          shopt -s extglob
          /tmp/shellharden/shellharden --check \
            hooks/_lib/!(detectors).sh \
            hooks/*.sh \
            scripts/*.sh

  # ─────────────────────────────────────────
  # bats による hook / _lib の単体テスト。
  # macos-latest と ubuntu-latest の matrix で BSD/GNU 差を検出する。
  # bats のバージョンは pin して両 OS 間の挙動差を抑える。
  # ─────────────────────────────────────────
  bats:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      # bats-core を install.sh で直接入れる。bats-core/bats-action@3.0.0 は
      # 内部で actions/cache@v4 を使い Node 20 deprecation + tar restore failure
      # warning を出すため不採用。git clone shallow + sudo install.sh は両 OS
      # (ubuntu-latest, macos-latest) で動き、Node 依存も外せる。
      - name: install bats 1.11.0
        run: |
          git clone --depth 1 --branch v1.11.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      - name: bats tests/
        run: bats -r tests/
