name: dashboard-ci

on:
  pull_request:
    paths:
      - "dashboard/**"
      - "schemas/**"
      - ".github/workflows/dashboard-ci.yml"
  # Manual rerun path: `gh workflow run dashboard-ci.yml --ref main`.
  # Used to validate an emergency direct-push to main without a PR.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: install
        working-directory: dashboard
        run: npm ci --prefer-offline

      - name: typecheck
        working-directory: dashboard
        run: npm run typecheck

      - name: lint (biome --error-on-warnings)
        working-directory: dashboard
        run: npm run lint

      - name: generate-types (verify schema sync)
        working-directory: dashboard
        run: |
          npm run generate-types
          if ! git diff --quiet -- src/types/; then
            # shellcheck disable=SC2016  # markdown-style code spans in error message
            echo "::error::generated types differ from committed src/types/. Run 'npm run generate-types' and commit the result." >&2
            git --no-pager diff -- src/types/
            exit 1
          fi

      - name: build
        working-directory: dashboard
        run: npm run build

      - name: test
        working-directory: dashboard
        run: npm test
