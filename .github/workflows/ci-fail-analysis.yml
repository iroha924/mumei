# Analyze a failed `ci` workflow run and post a helpful comment.
# Triggered via workflow_run after the ci workflow concludes with failure.
# - PR-triggered fails -> PR comment
# - main-push fails    -> issue (label: ci-fail)
name: ci-fail-analysis

on:
  # Disabled while ANTHROPIC_API_KEY billing is paused. Manual run only.
  # workflow_run:
  #   workflows:
  #     - ci
  #     - codeql
  #     - scorecards
  #     - gitleaks-weekly
  #     - mutable-tag-guard
  #     - pull-request-target-guard
  #     - signed-commit-verify
  #     - plugin-json-validate
  #   types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: read

# Opt into Node.js 24 for transitive JS actions (actions/setup-node,
# oven-sh/setup-bun) inside claude-code-base-action. Silences the Node 20
# deprecation warning until those actions publish Node 24-compatible tags.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  analyze:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Determine PR number (if any)
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          PRS_JSON: ${{ toJson(github.event.workflow_run.pull_requests) }}
        run: |
          set -euo pipefail
          # workflow_run carries pull_requests[] only for same-repo PRs;
          # fork-PR runs have an empty array. We fall back to gh pr list
          # by head branch as a best-effort.
          pr_number=$(printf '%s' "$PRS_JSON" | jq -r '.[0].number // empty')
          if [ -z "$pr_number" ]; then
            pr_number=$(gh pr list \
              --head "$HEAD_BRANCH" \
              --state open \
              --json number --jq '.[0].number // empty' 2>/dev/null || echo "")
          fi
          echo "number=${pr_number}" >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-base-action@e8132bc5e637a42c27763fc757faa37e1ee43b34 # beta
        env:
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/audit-prompts/ci-fail-analysis.md
          model: sonnet
          max_turns: "30"
          allowed_tools: "Read,Glob,Grep,Bash(gh run view:*),Bash(gh pr:*),Bash(gh issue:*),Bash(head:*),Bash(tail:*),Bash(grep:*)"
          # Disallow WebFetch explicitly: removing it from allowed_tools
          # alone is insufficient because the action's defaults include it.
          disallowed_tools: "WebFetch"
