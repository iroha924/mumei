name: plugin-json-validate

# Validate `.claude-plugin/plugin.json` against its declared `$schema`
# in strict mode whenever the manifest changes. Strict mode (a.k.a.
# `--all-errors --strict-types`) catches typos in field names,
# unrecognized properties, and incompatible types that the runtime
# would silently ignore. The Claude Code marketplace performs its own
# validation when the plugin is installed; this gate catches the same
# class of error before publish.

on:
  pull_request:
    # Restored after iter 2 lockout fix: plugin-json-validate fetches
    # the remote `$schema` URL on every run, and removing the paths
    # filter would couple every PR to that host's availability. Keep
    # the workflow scoped to manifest edits; correspondingly, `validate`
    # must NOT be a required status check on PRs that don't touch the
    # manifest.
    paths:
      - ".claude-plugin/plugin.json"
      # Re-trigger when the hash-locked validate dep set changes so a
      # Dependabot bump PR (.github/requirements/validate/{requirements.in,
      # requirements.txt}) self-tests the new lock against the live
      # manifest before it lands. Without this, a yanked hash or
      # incompatible transitive would only surface on the next manifest
      # PR or the weekly cron.
      - ".github/requirements/validate/**"
      - ".github/workflows/plugin-json-validate.yml"
      - "schemas/plugin.schema.json"
  schedule:
    # Weekly drift sentinel for the vendored schema: the "Vendored schema
    # drift vs remote" step below compares a normalized (sorted-keys) dump
    # of the remote $schema against schemas/plugin.schema.json and fails on
    # any divergence, so upstream json.schemastore.org changes surface even
    # when no manifest PR fires the paths filter.
    - cron: "30 9 * * 1" # Mondays 09:30 UTC
  workflow_dispatch: {}

permissions:
  contents: read

# Cancel superseded runs on PR synchronize; never cancel push-main / scheduled runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Pin Python to match the environment pip-compile used to lock
      # .github/requirements/validate/requirements.txt (see that file's
      # regen comment). Avoids silent drift from the runner's system
      # python3 to a future transitive dep that requires a newer minor.
      - name: Set up Python 3.14
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"

      - name: Install validation deps
        run: |
          python3 -m pip install --require-hashes -r .github/requirements/validate/requirements.txt

      - name: Validate plugin.json
        run: |
          python3 - <<'PY'
          import json
          import sys
          import urllib.request
          from pathlib import Path

          import jsonschema

          manifest_path = Path(".claude-plugin/plugin.json")
          if not manifest_path.is_file():
              print(f"manifest not found at {manifest_path}", file=sys.stderr)
              sys.exit(1)

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          schema_url = manifest.get("$schema")
          if not schema_url:
              print("manifest is missing $schema", file=sys.stderr)
              sys.exit(1)

          print(f"fetching schema: {schema_url}")
          with urllib.request.urlopen(schema_url, timeout=20) as resp:
              schema = json.loads(resp.read().decode("utf-8"))

          # Strict mode: collect every error via a Draft validator.
          validator_cls = jsonschema.validators.validator_for(schema)
          validator_cls.check_schema(schema)
          validator = validator_cls(schema)
          errors = sorted(validator.iter_errors(manifest), key=lambda e: list(e.absolute_path))

          if errors:
              for err in errors:
                  path = "/".join(str(p) for p in err.absolute_path) or "(root)"
                  print(f"::error file={manifest_path}::{path}: {err.message}")
              sys.exit(1)

          print(f"manifest valid against {schema_url}")
          PY

      # Exercise the same code path release-reusable.yml uses at tag time:
      # parse the vendored schema, check it is itself a valid JSON Schema,
      # and validate the manifest against it. Without this, a broken
      # vendored copy would first surface inside the release pipeline.
      - name: Validate vendored schema + manifest
        run: |
          python3 - <<'PY'
          import json
          import sys
          from pathlib import Path

          import jsonschema

          schema_path = Path("schemas/plugin.schema.json")
          manifest_path = Path(".claude-plugin/plugin.json")

          schema = json.loads(schema_path.read_text(encoding="utf-8"))
          validator_cls = jsonschema.validators.validator_for(schema)
          validator_cls.check_schema(schema)
          validator = validator_cls(schema)

          manifest = json.loads(manifest_path.read_text(encoding="utf-8"))
          errors = sorted(validator.iter_errors(manifest), key=lambda e: list(e.absolute_path))
          if errors:
              for err in errors:
                  path = "/".join(str(p) for p in err.absolute_path) or "(root)"
                  print(f"::error file={schema_path}::{path}: {err.message}")
              sys.exit(1)

          print(f"manifest valid against vendored {schema_path}")
          PY

      # Weekly drift sentinel: fail when the vendored copy no longer matches
      # the upstream schema byte-for-byte after key-order normalization.
      # Scoped to non-PR events so PR runs stay decoupled from upstream
      # availability beyond the $schema fetch above.
      - name: Vendored schema drift vs remote
        if: github.event_name != 'pull_request'
        run: |
          python3 - <<'PY'
          import json
          import sys
          import urllib.request
          from pathlib import Path

          vendored_path = Path("schemas/plugin.schema.json")
          vendored = json.loads(vendored_path.read_text(encoding="utf-8"))
          manifest = json.loads(Path(".claude-plugin/plugin.json").read_text(encoding="utf-8"))
          schema_url = manifest["$schema"]

          with urllib.request.urlopen(schema_url, timeout=20) as resp:
              remote = json.loads(resp.read().decode("utf-8"))

          norm = lambda obj: json.dumps(obj, sort_keys=True, indent=2)
          if norm(vendored) != norm(remote):
              print(f"::error file={vendored_path}::vendored schema has drifted from {schema_url} — refresh the vendored copy")
              sys.exit(1)

          print("vendored schema matches remote")
          PY

  # Active failure signal for scheduled runs: GitHub only emails the last
  # workflow-file committer on cron failures, which is easy to miss. Open a
  # deduped ci-fail issue instead so the failure lands in the issue list.
  notify-cron-failure:
    if: failure() && github.event_name == 'schedule'
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open ci-fail issue (deduped)
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          title="ci-fail: scheduled ${WORKFLOW} run failed"
          existing="$(gh issue list --repo "${GITHUB_REPOSITORY}" --state open --label ci-fail --search "in:title \"${title}\"" --json number --jq 'length')"
          if [ "${existing}" -gt 0 ]; then
            echo "open ci-fail issue already exists for this workflow; skipping"
            exit 0
          fi
          gh issue create --repo "${GITHUB_REPOSITORY}" --title "${title}" --label ci-fail \
            --body "Scheduled run failed: ${RUN_URL}"
