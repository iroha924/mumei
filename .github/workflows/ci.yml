name: ci

# Consolidated CI hub. Replaces the per-tool codeql.yml that previously
# ran in parallel on every push. scorecards.yml stays standalone because
# the scorecard action rejects workflows with global env / defaults.
#
# PR (developer flow) → lint, lint-extra, bats, codeql
# Push main → codeql only (Security tab feed; lint/lint-extra/bats are
#   PR-gated and skipped post-merge as redundant after squash-merge)
# Schedule weekly (Mon 03:00 UTC) → codeql security audit
# workflow_dispatch (manual) → lint, lint-extra, bats, codeql (recovery
#   path for emergency direct-push to main; trigger via
#   `gh workflow run ci.yml --ref main`)

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Mon 03:00 UTC — CodeQL weekly. Off-peak vs. scorecards (04:00) and
    # the gitleaks-weekly run (05:00) per scripts/check-workflow-cron.sh.
    - cron: "0 3 * * 1"
  # Manual rerun path: `gh workflow run ci.yml --ref main`. Used to
  # validate an emergency direct-push to main (CLAUDE.md "緊急時のみ"
  # clause) without round-tripping through a PR.
  workflow_dispatch:

# Default least-privilege: every job below performs only read-only
# inspection (shellcheck / bash -n / lint / typos / link check / SAST
# detector self-test). Per-job overrides (security-events: write for
# codeql / scorecards) are added inline.
permissions:
  contents: read

# Force every Node 20-based action (gitleaks-action v2.x today) onto
# Node 24. The October 2026 Node 20 removal will otherwise fail these
# actions; opting in early ensures CI behavior is invariant across
# the runner change-over.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Cancel superseded runs on PR synchronize; never cancel push-main / scheduled runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: install task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: "3.49.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # All static-lint checks below are exposed as Taskfile entries so
      # local (`task lint:...`) and CI invoke the SAME command. The
      # pre-commit hooks call scripts/lint-*.sh directly (Taskfile is
      # not pre-commit-aware); if a check passes one side and fails the
      # other, that means tool versions diverged (shellcheck, jq, awk)
      # — investigate the version, not the script.

      - name: shellcheck (hooks/_lib/*.sh + hooks/*.sh + scripts/*.sh)
        run: shellcheck hooks/_lib/*.sh hooks/*.sh scripts/*.sh

      - name: bash -n (full glob)
        run: |
          for f in hooks/_lib/*.sh hooks/*.sh scripts/*.sh; do
            bash -n "$f" || { echo "FAIL: $f"; exit 1; }
          done

      - name: verify mumei_ prefix on bash functions
        run: task lint:bash-prefix

      - name: jq empty (manifest, hooks)
        run: |
          jq empty .claude-plugin/plugin.json
          jq empty hooks/hooks.json

      - name: plan-vehicle hooks.json registration check
        run: task lint:plan-vehicle

      # scripts/lint-frontmatter.sh strict-parses YAML via python3 + PyYAML.
      # ubuntu-latest ships python3 but not PyYAML — install it explicitly
      # with a pinned version so the lint gate is reproducible across image
      # revisions and PyYAML releases. Hash-locked requirements (the pattern
      # used by plugin-json-validate.yml / review-reusable.yml for jsonschema
      # / semgrep) is intentionally not used here: a single internal dev dep
      # for parsing this repo's own frontmatter has no security boundary
      # that warrants the pip-compile maintenance cost.
      - name: install PyYAML (for lint:frontmatter)
        run: python3 -m pip install --quiet --break-system-packages 'pyyaml==6.0.3'

      - name: agent + skill frontmatter check
        run: task lint:frontmatter

      - name: Hook ID consistency (REQ-11.1)
        run: task lint:hook-ids

      - name: docs ↔ filesystem drift (REQ-11.2)
        run: task lint:docs-drift

      - name: review rubric parity (REQ-24.4)
        run: task lint:rubric

      # ─────────────────────────────────────────
      # 配布物 README / LICENSE 存在確認
      # ─────────────────────────────────────────
      - name: required top-level files
        run: |
          [[ -f README.md ]] || { echo "FAIL: README.md missing"; exit 1; }
          [[ -f LICENSE ]] || { echo "FAIL: LICENSE missing"; exit 1; }
          [[ -f .claude-plugin/plugin.json ]] || { echo "FAIL: plugin.json missing"; exit 1; }

  # ─────────────────────────────────────────
  # CI-only checks (REQ-5 Wave 3): things developers should NOT have to run
  # on every local commit because they hit the network or pull a release
  # binary on demand. The format / lint / test suite that runs on every
  # commit lives in `.pre-commit-config.yaml`; CONTRIBUTING.md instructs
  # contributors to `pre-commit install` so commits are gated locally
  # (the global no `--no-verify` rule prevents bypass). Duplicating those
  # hooks in CI would be redundant; instead we cover the gaps here.
  # ─────────────────────────────────────────
  lint-extra:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Minimum permissions per GitHub hardening guide
    # (https://docs.github.com/en/actions/security-for-github-actions/security-guides/automatic-token-authentication).
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # gitleaks needs full history to scan commits; default fetch-depth=1
          # makes its `--first-parent` walk fail with "stderr is not empty".
          fetch-depth: 0
          persist-credentials: false

      # markdownlint / typos / shfmt / actionlint / gitleaks run on every
      # PR. They also live in .pre-commit-config.yaml for local-commit
      # gating, but CI re-runs them so coverage holds even if a contributor
      # hasn't installed pre-commit (and required-status enforcement reaches
      # branch protection). post-merge runs would re-validate the same tree
      # already vetted at PR time and are intentionally skipped.

      - name: markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25 # v24.0.0
        with:
          globs: |
            **/*.md
            !**/node_modules/**
          config: .markdownlint-cli2.jsonc

      - name: typos
        uses: crate-ci/typos@bee27e3a4fd1ea2111cf90ab89cd076c870fce14 # v1.48.0

      - name: shfmt (shell format)
        run: |
          set -e
          mkdir -p /tmp/shfmt
          curl --retry 2 --max-time 60 --retry-delay 2 -sLo /tmp/shfmt/shfmt \
            "https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64"
          # Pin the binary by SHA256 to detect release-asset tampering or
          # accidental rate-limit HTML responses being mistaken for a binary.
          echo "fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1  /tmp/shfmt/shfmt" \
            | sha256sum -c -
          chmod +x /tmp/shfmt/shfmt
          /tmp/shfmt/shfmt -d -i 2 hooks/_lib/*.sh hooks/*.sh scripts/*.sh

      - name: actionlint
        # SHA-256 verify the installer script before running it. The tag pin
        # alone leaves Scorecards' downloadThenRun check unsatisfied because
        # `bash <(curl ...)` is treated as unpinned regardless of the tag.
        # The script at v1.7.7 defaults to version=1.7.6 if no arg is
        # provided, so we also pass `1.7.7` explicitly to match pre-commit.
        id: get_actionlint
        run: |
          INSTALLER_SHA="221d1d16c03e4e4fcd867de34104e8d479bdce20ccdfa553b9a5c0dc29bf6af2"
          curl --retry 2 --max-time 60 --retry-delay 2 -fsSL "https://raw.githubusercontent.com/rhysd/actionlint/v1.7.7/scripts/download-actionlint.bash" -o "${RUNNER_TEMP}/download-actionlint.bash"
          echo "${INSTALLER_SHA}  ${RUNNER_TEMP}/download-actionlint.bash" | sha256sum -c
          bash "${RUNNER_TEMP}/download-actionlint.bash" 1.7.7
        shell: bash
      - name: actionlint check
        run: ${{ steps.get_actionlint.outputs.executable }} -color
        shell: bash

      - name: gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pin gitleaks binary version to match .pre-commit-config.yaml
          # rev. gitleaks-action@v2 hard-codes a default that lags upstream,
          # so without this env CI lacks newer detectors (e.g.,
          # anthropic-api-key, notion-api-token added in 8.25+).
          # Keep aligned with .pre-commit-config.yaml gitleaks rev.
          GITLEAKS_VERSION: "8.30.1"

      # trufflehog complements gitleaks: gitleaks rules-based, trufflehog
      # entropy-based + verified-only mode catches secrets the rules miss.
      # Both run on every PR (lint-extra is PR-gated). Defense-in-depth is
      # preserved by the weekly full-history rescan in gitleaks.yml.
      - name: trufflehog (secret scan)
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          path: ./
          # Pin the docker image tag so the action's internal
          # `docker run ghcr.io/.../trufflehog:${VERSION}` does not float
          # to `:latest`. Keep this aligned with the action SHA pin
          # above and the .pre-commit-config.yaml trufflehog rev.
          version: "3.95.3"
          extra_args: --results=verified

      # lychee is heavy and rate-limit-sensitive; keep it out of pre-commit
      # (developer commits should not hammer external sites) but gate CI on it.
      # All knobs (max_retries, timeout, accept-list, exclude_path) live in
      # lychee.toml as the single source of truth — no CLI flags here, since
      # lychee's CLI args would silently override the toml.
      # lychee 0.24+ tarballs put the binary inside
      # `lychee-${ARCH}-unknown-linux-gnu/lychee`, but
      # `lycheeverse/lychee-action@v2.8.0` (latest as of 2026-05) still
      # assumes the v0.23.x layout where `lychee` is at the tarball
      # root, so its `install` step fails on v0.24+. Manual install
      # bypasses the action's broken extraction step. Bump the SHA256
      # together with the version — the binary name in the URL stays
      # "lychee-x86_64-unknown-linux-gnu.tar.gz" across versions.
      - name: install lychee v0.24.2
        run: |
          set -euo pipefail
          ver="0.24.2"
          url="https://github.com/lycheeverse/lychee/releases/download/lychee-v${ver}/lychee-x86_64-unknown-linux-gnu.tar.gz"
          tmp="$(mktemp -d)"
          curl --retry 2 --max-time 60 --retry-delay 2 -sSfL "$url" -o "$tmp/lychee.tar.gz"
          tar -xzf "$tmp/lychee.tar.gz" -C "$tmp"
          sudo install -m 0755 "$tmp/lychee-x86_64-unknown-linux-gnu/lychee" /usr/local/bin/lychee
          lychee --version

      - name: lychee (link check)
        run: lychee --no-progress './**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # semgrep self-scan (REQ-5.14): dogfood SAST against the mumei codebase.
      # Distinguish semgrep's exit codes (1 = findings, !=0,!=1 = infra failure)
      # so docker pull rate-limits / image moves are not misattributed as
      # "findings". Advisory: docker pull failures are still warnings, never
      # block the lint-extra job.
      - name: semgrep self-scan (advisory)
        run: |
          set +e
          docker run --rm -v "${PWD}:/src" -w /src semgrep/semgrep \
            semgrep scan --config=auto --error --quiet 2>/tmp/semgrep.err
          rc=$?
          # Distinguish exit codes so a real semgrep crash is not silently
          # filed under "rate limit". Reference: semgrep CLI exit codes.
          if (( rc == 0 )); then
            echo "semgrep: clean run, no findings"
          elif (( rc == 1 )); then
            echo "::warning::semgrep self-scan reported findings (advisory; review manually)"
          elif (( rc == 2 )); then
            echo "::warning::semgrep CLI / parse error (rc=2 — invalid config or argument; check stderr below)"
            tail -n 20 /tmp/semgrep.err >&2 || true
          elif (( rc == 125 )); then
            echo "::warning::docker container error (rc=125 — image pull rate limit, registry outage, or image moved; NOT a semgrep finding)"
          elif (( rc >= 128 )); then
            sig=$((rc - 128))
            echo "::warning::semgrep killed by signal (rc=$rc, signal=$sig — OOM, segfault, or external kill; check job log + stderr)"
            tail -n 20 /tmp/semgrep.err >&2 || true
          else
            echo "::warning::semgrep step failed with unexpected rc=$rc — check job log + stderr"
            tail -n 20 /tmp/semgrep.err >&2 || true
          fi
          exit 0

      # shellharden has no first-party pre-commit hook; install the release
      # binary and run it as a CI-only check. shellcheck (which IS in
      # pre-commit) catches bugs; shellharden enforces quoting — complementary.
      - name: shellharden (quoting hardening)
        run: |
          set -e
          mkdir -p /tmp/shellharden
          curl --retry 2 --max-time 60 --retry-delay 2 -sLo /tmp/shellharden/sh.tar.gz \
            "https://github.com/anordal/shellharden/releases/download/v4.3.1/shellharden-x86_64-unknown-linux-gnu.tar.gz"
          # Pin the tarball by SHA256 (defense against asset overwrite + helps
          # distinguish a yanked release from a successful download).
          echo "214ea28c25f6dbc6ac8928757397bf9c64e29af0df3751495beb034e7b5f68db  /tmp/shellharden/sh.tar.gz" \
            | sha256sum -c -
          tar -xzf /tmp/shellharden/sh.tar.gz -C /tmp/shellharden
          chmod +x /tmp/shellharden/shellharden
          /tmp/shellharden/shellharden --check \
            hooks/_lib/*.sh \
            hooks/*.sh \
            scripts/*.sh

  # ─────────────────────────────────────────
  # bats による hook / _lib の単体テスト。
  # macos-latest と ubuntu-latest の matrix で BSD/GNU 差を検出する。
  # bats のバージョンは pin して両 OS 間の挙動差を抑える。
  # ─────────────────────────────────────────
  bats:
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: install task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0
        with:
          version: "3.49.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # bats-core を install.sh で直接入れる。bats-core/bats-action@3.0.0 は
      # 内部で actions/cache@v4 を使い Node 20 deprecation + tar restore failure
      # warning を出すため不採用。git clone shallow + sudo install.sh は両 OS
      # (ubuntu-latest, macos-latest) で動き、Node 依存も外せる。
      - name: install bats 1.11.0
        run: |
          git clone --depth 1 --branch v1.11.0 https://github.com/bats-core/bats-core.git /tmp/bats-core
          sudo /tmp/bats-core/install.sh /usr/local
          bats --version

      # tests/scripts/lint-frontmatter.bats exercises scripts/lint-frontmatter.sh
      # which strict-parses YAML via python3 + PyYAML. PyYAML is not contractually
      # pre-installed on either runner image — install it on both OSes with the
      # same pinned version as the lint job above so behavior is identical.
      - name: install PyYAML (for lint-frontmatter regression tests)
        run: python3 -m pip install --quiet --break-system-packages 'pyyaml==6.0.3'

      - name: bats tests/
        run: task test:bats

  # ─────────────────────────────────────────
  # CodeQL static analysis (formerly codeql.yml). mumei is bash, which
  # CodeQL does not support natively — `shellcheck` (lint job above)
  # and `semgrep` (lint-extra job above) cover bash. CodeQL here scans:
  #   - `actions` for script-injection / untrusted-input flows in
  #     .github/workflows/
  # ─────────────────────────────────────────
  codeql:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3
        with:
          category: "/language:${{ matrix.language }}"

  # Active failure signal for scheduled runs: GitHub only emails the last
  # workflow-file committer on cron failures, which is easy to miss. Open a
  # deduped ci-fail issue instead so the failure lands in the issue list.
  notify-cron-failure:
    if: failure() && github.event_name == 'schedule'
    needs: [codeql]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open ci-fail issue (deduped)
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          title="ci-fail: scheduled ${WORKFLOW} run failed"
          existing="$(gh issue list --repo "${GITHUB_REPOSITORY}" --state open --label ci-fail --search "in:title \"${title}\"" --json number --jq 'length')"
          if [ "${existing}" -gt 0 ]; then
            echo "open ci-fail issue already exists for this workflow; skipping"
            exit 0
          fi
          gh issue create --repo "${GITHUB_REPOSITORY}" --title "${title}" --label ci-fail \
            --body "Scheduled run failed: ${RUN_URL}"
