# Weekly full audit of distribution files against the latest official Claude
# Code specs. Catches drift caused by upstream spec changes (mumei did not
# change, the spec did). Files an issue (label: audit-weekly) only when there
# are findings.
name: audit-distribution-weekly

on:
  # Disabled while ANTHROPIC_API_KEY billing is paused. Manual run only.
  # schedule:
  #   - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

# Opt into Node.js 24 for transitive JS actions (actions/setup-node,
# oven-sh/setup-bun) inside claude-code-base-action. Silences the Node 20
# deprecation warning until those actions publish Node 24-compatible tags.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: audit-distribution-weekly
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: anthropics/claude-code-base-action@e8132bc5e637a42c27763fc757faa37e1ee43b34 # beta
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt_file: .github/audit-prompts/distribution-audit-weekly.md
          model: sonnet
          max_turns: "40"
          # No WebFetch — its internal summarizer hits a discontinued Haiku
          # model and 404s. Use Bash(curl:*) instead per the prompt.
          # Disallow WebFetch explicitly: removing it from allowed_tools
          # alone is insufficient because the action's defaults include it.
          allowed_tools: "Read,Glob,Grep,Bash(curl:*),Bash(mkdir:*),Bash(gh issue:*),Bash(gh label:*)"
          disallowed_tools: "WebFetch"
