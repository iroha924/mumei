name: osv-scanner

# Cross-ecosystem vulnerability scanner from Google. Scans every
# dependency manifest in the repo against the OSV database (npm,
# pip, go, cargo, etc.). mumei is shell (no manifest); the scanned
# manifests are the pip lock files under .github/requirements/. CodeQL
# already runs from ci.yml; this workflow specifically targets known
# CVEs in declared dependencies.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Wed 06:00 UTC — off-peak vs. CodeQL (Mon) / Scorecards (Mon) /
    # gitleaks-weekly (Mon).
    - cron: "0 6 * * 3"
  workflow_dispatch:

permissions: read-all

# Cancel superseded runs on PR synchronize; never cancel push-main / scheduled runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scan:
    uses: google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
    with:
      # Point osv-scanner at the repo-level osv-scanner.toml so its
      # `IgnoredVulns` block (CVE entries with documented exploit-path
      # assessment + a finite `ignoreUntil`) is honoured. Setting
      # `scan-args` here replaces the reusable workflow's default
      # (`-r ./`), so re-include `-r` explicitly to preserve recursive
      # scanning across nested manifests
      # (.github/requirements/**/requirements.txt, etc.) — without `-r`
      # the scan would only look at the repo root and miss every
      # nested ecosystem manifest.
      scan-args: |-
        --config=osv-scanner.toml
        -r
        ./
    permissions:
      contents: read
      security-events: write
      actions: read

  # Active failure signal for scheduled runs: GitHub only emails the last
  # workflow-file committer on cron failures, which is easy to miss. Open a
  # deduped ci-fail issue instead so the failure lands in the issue list.
  notify-cron-failure:
    if: failure() && github.event_name == 'schedule'
    needs: [scan]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      issues: write
    steps:
      - name: Open ci-fail issue (deduped)
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -u
          title="ci-fail: scheduled ${WORKFLOW} run failed"
          existing="$(gh issue list --repo "${GITHUB_REPOSITORY}" --state open --label ci-fail --search "in:title \"${title}\"" --json number --jq 'length')"
          if [ "${existing}" -gt 0 ]; then
            echo "open ci-fail issue already exists for this workflow; skipping"
            exit 0
          fi
          gh issue create --repo "${GITHUB_REPOSITORY}" --title "${title}" --label ci-fail \
            --body "Scheduled run failed: ${RUN_URL}"
