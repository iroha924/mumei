name: pr

# Consolidated PR-time guards. Each job below was previously its own
# workflow file (signed-commit-verify / mutable-tag-guard /
# pull-request-target-guard). Bundling them as jobs of a single PR
# workflow keeps `gh run list` for a PR to one row per workflow rather
# than three, while preserving each guard's independent pass/fail
# status as a job within the PR run.

on:
  pull_request:
    branches: [main]
  # Direct pushes to main bypass PR gating (enforce_admins is off); running
  # the two guards on workflow-file pushes closes the unchecked path for
  # unpinned actions / pull_request_target introduced outside a PR.
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

# Cancel superseded runs on PR synchronize; never cancel push-main / scheduled runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ─────────────────────────────────────────
  # Reject any PR that introduces a third-party `uses:` reference
  # pinned to a mutable target (vN floating tag, main, master, branch).
  # Counters the tj-actions / Trivy-style supply-chain pattern where a
  # malicious force-push to a mutable tag rotates code under everyone's
  # floating-tag reference. This file scans itself too; keep comments and
  # example strings here written so they do not start a line with a bare
  # uses/pull_request_target token, or the guards will flag them.
  # ─────────────────────────────────────────
  mutable-tag-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Reject mutable uses references
        run: |
          set -u
          shopt -s nullglob
          mapfile -t files < <(
            find .github/workflows -maxdepth 1 -type f \
              \( -name '*.yml' -o -name '*.yaml' \) \
              | sort
          )
          if [ "${#files[@]}" -eq 0 ]; then
            echo "no workflow files to scan"
            exit 0
          fi
          # SHA pinning alone only proves the code cannot rotate under us — it
          # says nothing about WHOSE code it is. `attacker/exfil@<40 hex>` is
          # perfectly pinned. The owner allowlist is the second half: a new
          # third-party action requires a deliberate edit to this list, which
          # lands in the diff and needs review.
          ALLOWED_OWNERS="actions anchore anthropics crate-ci DavidAnson github gitleaks go-task google iroh4-labs ossf sigstore slsa-framework trufflesecurity"
          uses_line='^[[:space:]]*-?[[:space:]]*uses:[[:space:]]+'
          local_action="${uses_line}\\."
          valid_sha="${uses_line}[^/[:space:]]+/[^@[:space:]]+@[a-f0-9]{40}([[:space:]]+#.*)?[[:space:]]*$"
          violations=""
          unlisted=""
          for f in "${files[@]}"; do
            while IFS= read -r line_with_no; do
              [ -n "$line_with_no" ] || continue
              n="${line_with_no%%:*}"
              line="${line_with_no#*:}"
              if printf '%s\n' "$line" | grep -qE "$local_action"; then continue; fi
              if ! printf '%s\n' "$line" | grep -qE "$valid_sha"; then
                violations+="${f}:${n}:${line}"$'\n'
                continue
              fi
              ref="${line#*uses:}"
              ref="${ref#"${ref%%[![:space:]]*}"}"
              owner="${ref%%/*}"
              case " ${ALLOWED_OWNERS} " in
              *" ${owner} "*) ;;
              *) unlisted+="${f}:${n}: owner '${owner}' is not in ALLOWED_OWNERS"$'\n' ;;
              esac
            done < <(grep -nE "$uses_line" "$f" || true)
          done
          if [ -n "$violations" ]; then
            echo "::error::Mutable uses: references detected. Pin to a 40-char commit SHA with a trailing # version comment."
            printf '%s' "$violations"
            exit 1
          fi
          if [ -n "$unlisted" ]; then
            echo "::error::uses: references an action owner outside ALLOWED_OWNERS. A SHA pin proves immutability, not provenance — add the owner to the allowlist in .github/workflows/pr.yml only after reviewing who they are."
            printf '%s' "$unlisted"
            exit 1
          fi
          echo "all uses: references are SHA-pinned and owned by an allowlisted org"

  # ─────────────────────────────────────────
  # Reject any PR that introduces a new workflow using
  # `pull_request_target` outside the explicit ALLOWLIST. The trigger
  # runs in the base repo's context with secret access — canonical
  # attack surface for fork-PR-driven secret exfiltration. This file
  # scans itself too (the trigger token only appears mid-line here,
  # which the line-anchored grep ignores).
  # ─────────────────────────────────────────
  pr-target-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Reject new pull_request_target usage
        run: |
          set -u
          ALLOWLIST=""
          shopt -s nullglob
          mapfile -t files < <(
            find .github/workflows -maxdepth 1 -type f \
              \( -name '*.yml' -o -name '*.yaml' \) \
              | sort
          )
          violations=""
          for f in "${files[@]}"; do
            base="$(basename "$f")"
            if grep -qE '^[[:space:]]*-?[[:space:]]*pull_request_target' "$f"; then
              if ! printf '%s\n' "$ALLOWLIST" | grep -qFx "$base"; then
                violations+="$f"$'\n'
              fi
            fi
          done
          if [ -n "$violations" ]; then
            echo "::error::pull_request_target detected in workflow(s) not on the allowlist:"
            printf '%s' "$violations"
            echo ""
            echo "Either remove the trigger or add the basename to the ALLOWLIST in pr.yml within this same PR."
            exit 1
          fi
          echo "no unauthorized pull_request_target usage"
