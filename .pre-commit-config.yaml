# pre-commit (https://pre-commit.com) — local quality gate before push.
# Mirror the CI lint-extra job so CI failures are caught locally.
# All hook revs are pinned to immutable tags per the official guidance.
# Update with `pre-commit autoupdate`.

repos:
  # Prep stage — chmod +x newly-authored shebang files and shfmt -w
  # them BEFORE the validators below run. Eliminates the manual
  # `shfmt -w` and `chmod +x` round-trip that used to be needed on
  # the first commit of a new shell file.
  - repo: local
    hooks:
      - id: prep-bash-shebang
        name: prep-bash-shebang (chmod +x + shfmt -w on staged shell files)
        entry: bash scripts/prep-bash-shebang.sh
        language: system
        types: [shell]
        require_serial: true
        exclude: "^tests/properties/"

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(\.mumei/|docs/|examples/|CODE_OF_CONDUCT\.md)
      - id: end-of-file-fixer
        exclude: ^(\.mumei/|docs/|examples/|CODE_OF_CONDUCT\.md)
      - id: check-yaml
        exclude: ^\.mumei/
      - id: check-json
        exclude: ^\.mumei/
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        # dashboard/ is owned by Biome (`biome check`); prettier and Biome
        # disagree on line wrap (one-line vs multi-line refs[]) which
        # causes auto-fix ping-pong. Schemas/ ships JSON Schemas with
        # specific layout we don't want re-formatted.
        exclude: ^(\.mumei/|docs/|examples/|CODE_OF_CONDUCT\.md|\.markdownlint-cli2\.jsonc|dashboard/|schemas/)

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint-cli2.jsonc"]

  - repo: https://github.com/crate-ci/typos
    rev: v1.46.0
    hooks:
      - id: typos
        # use _typos.toml from repo root
        pass_filenames: false

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-d", "-i", "2"]
        exclude: "^tests/properties/"

  # shellcheck via locally-installed binary (system) — avoids the Docker
  # dependency that koalaman/shellcheck-precommit imposes (it runs the
  # checker in a container, which fails on hosts without Docker).
  # Contributors must `brew install shellcheck` (or distro equivalent).
  # `-x` follows external `source` directives so cross-file declarations
  # are honored. tests/ is excluded because bats files exercise idioms
  # (subshell PATH manipulation, intentional `ls -i` for inode reads,
  # export-with-command-substitution helpers) that conflict with shellcheck's
  # static analysis but are correct in the bats execution model.
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck (system)
        entry: shellcheck -x
        language: system
        types: [shell]
        exclude: ^tests/
        require_serial: false

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.7
    hooks:
      - id: actionlint

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.95.3
    hooks:
      - id: trufflehog
        name: trufflehog (filesystem)
        # Scan the working tree only on commit. Verified-only results
        # to keep the noise floor low; the weekly gitleaks-weekly
        # workflow does the deeper full-repo pass against history.
        entry: bash -c 'trufflehog filesystem --no-update --fail --no-verification --results=verified .'
        language: system

  # Hook ID + docs drift linters (REQ-11.1 / REQ-11.2). Run on every
  # commit because they are fast (whole-repo grep / awk) and catch the
  # W-02 / W-03 regression class deterministically before push.
  - repo: local
    hooks:
      - id: lint-hook-ids
        name: lint-hook-ids (REQ-11.1)
        entry: bash scripts/lint-hook-ids.sh
        language: system
        pass_filenames: false
        always_run: true
      - id: lint-docs-drift
        name: lint-docs-drift (REQ-11.2)
        entry: bash scripts/lint-docs-drift.sh
        language: system
        pass_filenames: false
        always_run: true
  # Run the project's own bats suite at pre-push time so test failures
  # land before reaching CI without paying the cost on every commit.
  # The 176-test full suite takes ~10 s on this repo; commits stay
  # snappy and the same correctness guarantee holds at push time.
  # Mirrors the `bats -r tests/` job in ci.yml.
  - repo: local
    hooks:
      - id: bats
        name: bats (full suite)
        entry: bats -r tests/
        language: system
        pass_filenames: false
        stages: [pre-push]
        types_or: [shell, file]
        files: '^(hooks/|scripts/|tests/|.pre-commit-config\.yaml$)'

  # Run lychee link check at pre-push time. HTTP fetches are inherently
  # slow even with .lycheecache; per-commit cost was disrupting the dev
  # flow. Same lychee.toml drives both pre-push and ci.yml.
  - repo: local
    hooks:
      - id: lychee
        name: lychee (link check)
        entry: lychee --no-progress
        language: system
        pass_filenames: true
        stages: [pre-push]
        files: '\.md$'

  # Full lint at pre-push — calls scripts/lint-all.sh, which is the
  # SAME entry point CI's `lint` job uses (via individual sub-script
  # calls). Catches "passes locally but fails CI" issues *before* push:
  # missing `mumei_` prefix, broken hooks.json registration, frontmatter
  # drift, etc. always_run because the checks are full-glob (independent
  # of which files changed in the commits being pushed).
  - repo: local
    hooks:
      - id: lint-all
        name: lint-all (CI parity)
        entry: bash scripts/lint-all.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # Dashboard biome lint at pre-push — mirrors dashboard-ci.yml's lint
  # step. `--error-on-warnings` upgrades any warning to a non-zero exit,
  # so dashboard/ keeps a strict zero-warning posture both locally and
  # in CI. Scoped to dashboard/ so non-dashboard commits don't pay the
  # cost.
  - repo: local
    hooks:
      - id: dashboard-biome
        name: dashboard biome (--error-on-warnings)
        entry: bash -c 'cd dashboard && npm run lint'
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^dashboard/
