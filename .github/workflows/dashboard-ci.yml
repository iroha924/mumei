name: dashboard-ci

on:
  pull_request:
    paths:
      - "dashboard/**"
      - "schemas/**"
      - ".github/workflows/dashboard-ci.yml"
  # Manual rerun path: `gh workflow run dashboard-ci.yml --ref main`.
  # Used to validate an emergency direct-push to main without a PR.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: install task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 # v2.0.0
        with:
          version: "3.49.1"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: install
        run: task dashboard:install

      # Gate moderate+ severity CVEs in declared npm deps. The
      # ecosystem-wide osv-scanner.yml workflow also catches these,
      # but failing here gives the dashboard PR author an immediate
      # signal instead of waiting for the cross-ecosystem run.
      - name: npm audit (moderate+)
        working-directory: dashboard
        run: npm audit --audit-level=moderate

      - name: typecheck
        run: task dashboard:typecheck

      - name: lint (biome --error-on-warnings)
        run: task dashboard:lint

      - name: schemas (verify TypeBox -> JSON Schema drift)
        working-directory: dashboard
        run: |
          npm run schemas
          if ! git -C .. diff --quiet -- schemas/; then
            # shellcheck disable=SC2016  # markdown-style code spans in error message
            echo "::error::generated schemas differ from committed schemas/. Run 'task dashboard:schemas' (from repo root) or 'task schemas' (from dashboard/) and commit the result." >&2
            git -C .. --no-pager diff -- schemas/
            exit 1
          fi

      - name: build
        run: task dashboard:build

      - name: test
        run: task dashboard:test
