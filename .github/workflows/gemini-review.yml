name: gemini-review

# Reusable Gemini PR review workflow. Called by gemini-dispatch.yml
# when a `pull_request` event maps to command=review (opened /
# synchronize / reopened / `@gemini-cli /review` comment) or by
# explicit workflow_call from elsewhere.
#
# Authentication priority (first non-empty wins):
#   1. GitHub App token (vars.APP_ID + secrets.APP_PRIVATE_KEY)
#   2. secrets.GITHUB_TOKEN (default action token)
#   3. github.token (fallback)
#
# Required to be set BEFORE this workflow can run successfully:
#   - secrets.GEMINI_API_KEY  -> Google AI Studio API key
#   - vars.GEMINI_MODEL       -> e.g. "gemini-3.1-pro-preview"
#                                See https://ai.google.dev/gemini-api/docs/models
#                                When the preview promotes to stable,
#                                bump this var to the new ID.
# If GEMINI_API_KEY is unset the action exits with an auth error;
# this is intentional so the misconfiguration surfaces loudly.

on:
  workflow_call:
    inputs:
      additional_context:
        type: string
        description: Free-form context appended to the review prompt (e.g. from `@gemini-cli /review <text>`).
        required: false

concurrency:
  group: "${{ github.workflow }}-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  review:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Mint identity token
        id: mint_identity_token
        if: ${{ vars.APP_ID }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v3.1.1
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          permission-contents: read
          permission-issues: write
          permission-pull-requests: write

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Prepare prompt context
        run: |
          mkdir -p .gemini
          jq -n \
            --arg repo "${REPOSITORY}" \
            --arg pr "${PULL_REQUEST_NUMBER}" \
            --arg context "${ADDITIONAL_CONTEXT}" \
            '{repository: $repo, pull_request_number: $pr, additional_context: $context}' > .gemini/context.json
        env:
          REPOSITORY: ${{ github.repository }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          ADDITIONAL_CONTEXT: ${{ inputs.additional_context }}

      - name: Run Gemini pull request review
        id: gemini_pr_review
        uses: google-github-actions/run-gemini-cli@f77273f4c914e4bf38440cf36a0369cb64a37489 # v0.1.22
        env:
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          GITHUB_TOKEN: ${{ steps.mint_identity_token.outputs.token || secrets.GITHUB_TOKEN || github.token }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          gemini_cli_version: ${{ vars.GEMINI_CLI_VERSION }}
          # Default debug ON during the dogfood / shake-down phase.
          # Override by setting `vars.GEMINI_DEBUG=false` once the
          # integration is stable.
          gemini_debug: ${{ fromJSON(vars.GEMINI_DEBUG || true) }}
          gemini_model: ${{ vars.GEMINI_MODEL }}
          workflow_name: gemini-review
          # Set the PR number explicitly so issue_comment triggers
          # (which GitHub treats as issues) still work.
          github_pr_number: ${{ github.event.pull_request.number }}
          settings: |-
            {
              "model": {
                "maxSessionTurns": 25
              },
              "telemetry": {
                "enabled": true,
                "target": "local",
                "outfile": ".gemini/telemetry.log"
              },
              "mcpServers": {
                "github": {
                  "command": "docker",
                  "args": [
                    "run",
                    "-i",
                    "--rm",
                    "-e",
                    "GITHUB_PERSONAL_ACCESS_TOKEN",
                    "ghcr.io/github/github-mcp-server:v0.27.0"
                  ],
                  "includeTools": [
                    "add_comment_to_pending_review",
                    "create_pending_pull_request_review",
                    "submit_pending_pull_request_review",
                    "get_pull_request",
                    "get_pull_request_diff"
                  ],
                  "env": {
                    "GITHUB_PERSONAL_ACCESS_TOKEN": "${GITHUB_TOKEN}"
                  }
                }
              },
              "tools": {
                "core": []
              }
            }
          # Custom prompt — does NOT use the gemini-cli-extensions/code-review
          # `/pr-code-review` slash command. That extension references MCP tool
          # names (e.g., `pull_request_read.get_diff`) that do not match the
          # registry exposed by `github-mcp-server:v0.27.0`, causing Gemini to
          # exhaust its turn budget searching for non-existent tools and exit
          # with an empty response. Tracked upstream as
          # https://github.com/google-github-actions/run-gemini-cli/issues/510
          # (PR #515 pending). Until that lands, we drive the review directly
          # so tool names match what the MCP server actually publishes.
          # GEMINI.md (project root) is auto-loaded by gemini-cli and supplies
          # the review rubric / what-to-flag / what-to-skip; this prompt only
          # orchestrates the GitHub Review API dance.
          prompt: |-
            You are reviewing pull request #${{ github.event.pull_request.number }}
            in repository ${{ github.repository }}. The review rubric, severity
            scale, and project-specific conventions are in `GEMINI.md` at the
            workspace root — read it first.

            Steps:

            1. Call `get_pull_request` to fetch the PR title / body / metadata.
            2. Call `get_pull_request_diff` to fetch the full diff.
            3. Apply the review per `GEMINI.md`. Skip findings without a
               concrete failure scenario (per the rubric's "no concrete
               failure scenario → omit" rule).
            4. Open a pending review with
               `create_pending_pull_request_review` (event_type omitted at
               creation; see step 6). If the call returns
               "can only have one pending review per pull request",
               continue to step 5 — the existing pending review is fine.
            5. For each finding, call `add_comment_to_pending_review` with the
               appropriate `path`, `line`, `side` (`RIGHT` for added /
               modified lines, `LEFT` for removed lines), and a body that
               starts with `[SEVERITY]` (HIGH / MEDIUM / LOW / NIT).
               When you have a concrete code suggestion, include a
               ```suggestion block``` so GitHub renders the apply button.
            6. Call `submit_pending_pull_request_review` with
               `event_type: "COMMENT"` (do NOT use APPROVE or REQUEST_CHANGES)
               and a `body` formatted as:

                   ## 📋 Review Summary

                   A brief 2-3 sentence assessment of the PR's objective and
                   overall quality.

                   ## 🔍 General Feedback

                   - Bullets for general observations or recurring patterns
                     that don't fit on a specific line.

            If no findings warrant flagging, still submit a COMMENT review
            with a summary that says "No blocking issues found." plus any
            positive observations.
