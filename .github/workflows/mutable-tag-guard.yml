name: mutable-tag-guard

# Reject any pull request that introduces a third-party `uses:` reference
# pinned to a mutable target (a `vN` floating tag, `main`, `master`, or a
# named branch). All third-party actions must be pinned to a 40-char
# commit SHA with the version tag retained as a trailing comment, e.g.
# `uses: foo/bar@<sha> # v1.2.3`. This is the structural countermeasure
# to the tj-actions / Trivy-style supply-chain compromise pattern where a
# malicious force-push to a mutable tag rotates code under everyone's
# pinned `@v1` reference.
#
# Self-exclusion: this workflow file is excluded from the scan because
# the matching grep below would otherwise flag the example patterns
# embedded in this comment header.

on:
  pull_request:
    paths:
      - ".github/workflows/**"

permissions:
  contents: read

jobs:
  mutable-tag-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Reject mutable `uses:` references
        run: |
          set -u
          shopt -s nullglob

          # Files to scan: every workflow except this guard itself.
          mapfile -t files < <(
            find .github/workflows -maxdepth 1 -type f \
              \( -name '*.yml' -o -name '*.yaml' \) \
              ! -name 'mutable-tag-guard.yml' \
              | sort
          )

          if [ "${#files[@]}" -eq 0 ]; then
            echo "no workflow files to scan"
            exit 0
          fi

          # Positive match: a non-local `uses:` line is acceptable iff it
          # is pinned to a 40-char lowercase hex SHA, optionally followed
          # by a `# <tag>` comment. Anything else (semver tag, major-only
          # tag, branch name, partial SHA) is mutable and rejected.
          # `uses: ./...` references local actions and is exempt.
          # SLSA reusable workflow form `<repo>/.github/workflows/foo.yml@<sha>`
          # is also accepted (path between repo and `@`).
          uses_line='^[[:space:]]*-?[[:space:]]*uses:[[:space:]]+'
          local_action="${uses_line}\\."  # uses: ./...
          valid_sha="${uses_line}[^/[:space:]]+/[^@[:space:]]+@[a-f0-9]{40}([[:space:]]+#.*)?[[:space:]]*$"

          violations=""
          for f in "${files[@]}"; do
            # Every uses: line that is not local AND not SHA-pinned is a violation.
            while IFS= read -r line_with_no; do
              [ -n "$line_with_no" ] || continue
              # split off line number prefix from grep -n
              n="${line_with_no%%:*}"
              line="${line_with_no#*:}"
              # exempt local action refs
              if printf '%s\n' "$line" | grep -qE "$local_action"; then
                continue
              fi
              # accept SHA-pinned
              if printf '%s\n' "$line" | grep -qE "$valid_sha"; then
                continue
              fi
              violations+="${f}:${n}:${line}"$'\n'
            done < <(grep -nE "$uses_line" "$f" || true)
          done

          if [ -n "$violations" ]; then
            echo "::error::Mutable uses: references detected. Pin to a 40-char commit SHA with a trailing # version comment."
            printf '%s' "$violations"
            exit 1
          fi

          echo "all uses: references are SHA-pinned"
