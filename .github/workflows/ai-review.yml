name: ai-review

# Self-hosted multi-LLM PR review tuned for AI-generated code.
#
# Architecture (see `.github/ai-review/`):
#   1. Per-LLM jobs (`gemini` + `openai`) call run-review.sh, which builds a
#      provider-agnostic prompt, hits the provider's API with strict
#      structured output (JSON schema mode), and writes findings.json + a
#      meta.json with token counts and cost.
#   2. The `aggregate` job downloads every per-LLM artifact, clusters
#      findings by (file, line ±2), tags each cluster as
#      consensus / majority / individual, and posts a single sticky status
#      comment + inline review comments for non-individual findings.
#
# Why home-grown instead of pr-agent / Qodo / CodeRabbit?
#   - AI-generated code has defect classes (hallucinated APIs, phantom
#     parameters, silent inversion, defensive overengineering, type drift)
#     that off-the-shelf reviewers don't prioritise.
#   - Multi-LLM ensemble (Mozilla AI "Star Chamber" pattern + arxiv
#     2602.09341) catches strictly more than single-LLM review at the cost
#     of running both providers in parallel.
#   - The prompt + schema live in this repo as source files we can iterate
#     on, not buried in a third-party container.
#
# Reusable across projects: the scripts under `.github/ai-review/` and this
# workflow are self-contained and provider-keyed via env vars. Copying both
# directories into another repo plus setting GEMINI_API_KEY / OPENAI_KEY
# secrets enables the same pipeline elsewhere.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - GEMINI_API_KEY  (Google AI Studio)
#   - OPENAI_KEY      (OpenAI Platform)
# `GITHUB_TOKEN` is supplied automatically.
#
# Cost (May 2026 list prices):
#   - Gemini 3.1 Pro Preview: $2  in / $12 out per 1M tokens
#   - GPT-5.5:                $5  in / $30 out per 1M tokens

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  gemini:
    name: review (gemini-3.1-pro)
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      LLM_PROVIDER: gemini
      LLM_MODEL: gemini-3.1-pro-preview
      LLM_DISPLAY_NAME: Gemini 3.1 Pro
      INPUT_PRICE_PER_M: "2"
      OUTPUT_PRICE_PER_M: "12"
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      OUT_DIR: ${{ github.workspace }}/.ai-review-out
    steps:
      # Check out the BASE ref (not the PR head) so a malicious or
      # accidentally-broken PR cannot modify run-review.sh to exfiltrate
      # the LLM API keys this step exposes. The PR diff being reviewed
      # is fetched via the GitHub API inside the script, so no PR-head
      # code is executed here. (Flagged as CONSENSUS / critical by both
      # LLM reviewers — supply-chain security.)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Run Gemini review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: .github/ai-review/run-review.sh

      # `if: always()` so the failure-marker findings.json + meta.json
      # written by run-review.sh on a non-zero exit also make it to the
      # aggregate job, which then renders the `⚠ status` row instead of
      # silently dropping the failed provider.
      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4
        with:
          name: ai-review-gemini
          path: ${{ env.OUT_DIR }}
          retention-days: 1
          if-no-files-found: error

  openai:
    name: review (gpt-5.5)
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-5.5
      LLM_DISPLAY_NAME: GPT-5.5
      INPUT_PRICE_PER_M: "5"
      OUTPUT_PRICE_PER_M: "30"
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      OUT_DIR: ${{ github.workspace }}/.ai-review-out
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Run OpenAI review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_KEY: ${{ secrets.OPENAI_KEY }}
        run: .github/ai-review/run-review.sh

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@26f96dfa697d77e81fd5907df203aa23a56210a8 # v4
        with:
          name: ai-review-openai
          path: ${{ env.OUT_DIR }}
          retention-days: 1
          if-no-files-found: error

  aggregate:
    name: aggregate review
    needs: [gemini, openai]
    if: ${{ always() && github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      REPO: ${{ github.repository }}
      PR: ${{ github.event.pull_request.number }}
      COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
      STATUS_MARKER: "<!-- ai-review-status -->"
      INPUT_DIR: ${{ github.workspace }}/.ai-review-in
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Download all per-LLM artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: ${{ env.INPUT_DIR }}

      - name: Aggregate + post
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/ai-review/aggregate-and-post.sh
